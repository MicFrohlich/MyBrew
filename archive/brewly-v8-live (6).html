<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Brewly</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#120B06;overflow:hidden;-webkit-font-smoothing:antialiased}
:root{
  --cr:#FAF8F3;--cr2:#F2EDE3;--cr3:#E8DFD0;
  --ink:#1E0F07;--ink2:#3D2010;--ink3:#6B4030;
  --gld:#C8974A;--gld2:#E8C07A;--gld3:#F5E4C0;
  --sge:#6D8C6A;--sge2:#9DB89A;--sge3:#E2F0DF;
  --rst:#A83820;--rst2:#D4614A;--rst3:#FCEAE6;
  --pur:#7C3AED;--pur2:#EDE9FE;
  --b:rgba(30,15,7,.08);--b2:rgba(30,15,7,.14);--b3:rgba(30,15,7,.22);
  --sh:0 1px 8px rgba(30,15,7,.06);--sh2:0 4px 20px rgba(30,15,7,.10);--sh3:0 12px 40px rgba(30,15,7,.15);
}
body{display:flex;align-items:center;justify-content:center}
.shell{width:390px;height:820px;background:var(--cr);border-radius:32px;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.view{flex:1;overflow-y:auto;overflow-x:hidden}.view::-webkit-scrollbar{display:none}
.nav{display:flex;background:#fff;border-top:.5px solid var(--b2);padding:6px 0 8px;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;background:none;border:none;font-family:'Inter',sans-serif;font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3);cursor:pointer}
.nb.on{color:var(--ink)}.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.pip{width:4px;height:4px;border-radius:2px;background:var(--gld);opacity:0;margin-top:1px}.nb.on .pip{opacity:1}
.serif{font-family:'Cormorant Garamond',serif}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-dk{background:var(--ink);color:#fff}.btn-sge{background:var(--sge);color:#fff}.btn-out{background:transparent;border:.5px solid var(--b3);color:var(--ink)}
.inp{width:100%;padding:11px 14px;border-radius:10px;border:.5px solid var(--b2);background:var(--cr2);font-size:13px;color:var(--ink);outline:none;font-family:'Inter',sans-serif}
.inp:focus{border-color:var(--gld);background:#fff}.inp::placeholder{color:var(--ink3)}
.ta{width:100%;padding:10px 14px;border-radius:10px;border:.5px solid var(--b2);background:var(--cr2);font-size:13px;color:var(--ink);outline:none;font-family:'Inter',sans-serif;resize:none;min-height:68px;line-height:1.5}
.ta:focus{border-color:var(--gld);background:#fff}
.chip{display:inline-block;padding:5px 11px;border-radius:999px;font-size:11px;border:.5px solid var(--b2);background:var(--cr2);color:var(--ink);cursor:pointer;margin:3px;font-weight:500}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}.chip.sge{background:var(--sge3);color:var(--sge);border-color:rgba(109,140,106,.3)}.chip.gld{background:var(--gld3);color:var(--ink2);border-color:rgba(200,151,74,.35)}.chip.rst{background:var(--rst3);color:var(--rst)}.chip.pur{background:var(--pur2);color:var(--pur)}
.mb{position:absolute;inset:0;background:rgba(18,11,6,.58);z-index:200;display:flex;align-items:flex-end}
.ms{background:var(--cr);border-radius:24px 24px 0 0;width:100%;max-height:92%;overflow-y:auto;padding:18px 18px 30px}
.ms::-webkit-scrollbar{display:none}.mh{width:38px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 16px}
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:999px;font-size:12px;font-weight:500;z-index:999;white-space:nowrap;pointer-events:none;animation:tin .2s ease;box-shadow:var(--sh3)}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{animation:up .18s ease}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.card{background:#fff;border:.5px solid var(--b);border-radius:14px;box-shadow:var(--sh)}
.lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);font-weight:500}
.sep{height:.5px;background:var(--b);margin:10px 0}
.p16{padding:16px}.px16{padding-left:16px;padding-right:16px}
.pts{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;background:var(--gld3);color:var(--ink2);font-size:11px;font-weight:600;border:.5px solid rgba(200,151,74,.4)}
.hot-b{background:linear-gradient(135deg,#FF4500,#FF8C00);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;display:inline-flex;align-items:center;gap:3px}
.rise-b{background:var(--pur2);color:var(--pur);font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px}
.live-tag{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:#fff;background:var(--rst2);padding:2px 8px;border-radius:999px}
.live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
.star{font-size:26px;cursor:pointer;color:rgba(30,15,7,.12)}.star.lit{color:var(--gld)}
.mr{border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.mr-in{border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--ink);font-size:10px;position:absolute}
.ftab-row{display:flex;border-bottom:.5px solid var(--b);background:#fff;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.ftab-row::-webkit-scrollbar{display:none}
.ftab{padding:10px 13px;text-align:center;font-size:11px;font-weight:500;cursor:pointer;color:var(--ink3);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.ftab.on{color:var(--ink);border-bottom-color:var(--gld)}
.prog{height:4px;background:var(--b);border-radius:2px;overflow:hidden}
.prog-f{height:100%;background:var(--sge);border-radius:2px}
.bb{background:rgba(255,255,255,.1);border:.5px solid rgba(255,255,255,.15);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.bbl{background:var(--cr2);border:.5px solid var(--b2);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.cd-bar{background:linear-gradient(135deg,#1A0A04,#2C1208);border:1px solid rgba(200,151,74,.3);border-radius:14px;padding:12px 14px;margin:10px 16px 0;cursor:pointer;position:relative;overflow:hidden}
.cd-dot{width:6px;height:6px;border-radius:50%;background:var(--gld);animation:pulse 1.5s ease infinite;display:inline-block;flex-shrink:0}
.cd-wave{display:flex;align-items:flex-end;gap:2px;height:14px}
.cd-wb{width:3px;border-radius:2px;background:var(--gld);animation:wv 1.2s ease infinite}
.cd-wb:nth-child(2){animation-delay:.1s;height:60%}.cd-wb:nth-child(3){animation-delay:.2s;height:100%}.cd-wb:nth-child(4){animation-delay:.3s;height:70%}.cd-wb:nth-child(5){animation-delay:.4s;height:45%}
@keyframes wv{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
.feed-item{padding:13px 16px;border-bottom:.5px solid var(--b);background:#fff}
.upvote-btn{display:inline-flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;color:var(--ink3);background:none;border:none;padding:3px 7px;border-radius:6px;font-family:'Inter',sans-serif}
.upvote-btn.on{color:var(--gld);background:var(--gld3)}
.poll-opt{background:var(--cr2);border:.5px solid var(--b2);border-radius:9px;padding:9px 12px;margin-bottom:6px;cursor:pointer;position:relative;overflow:hidden}
.soc-row{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:.5px solid var(--b);background:#fff}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:0 6px 28px rgba(30,15,7,.2)!important;border:none!important;padding:0!important}
.leaflet-popup-content{margin:0!important;font-family:'Inter',sans-serif}
.leaflet-popup-tip-container{display:none!important}
.bp-tab{padding:7px 12px;border-radius:999px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;white-space:nowrap}
.bp-tab.on{background:#fff;color:var(--ink)}.bp-tab.off{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.intel-card{background:#fff;border-radius:13px;border:.5px solid var(--b);padding:14px;margin-bottom:10px}
.rec-card{border-radius:12px;padding:13px 14px;margin-bottom:9px;border-left:3px solid}
.insight-bar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--b)}
.insight-bar:last-child{border-bottom:none}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.upload-zone{border:1.5px dashed var(--b3);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:var(--cr2)}
.upload-zone:hover{border-color:var(--gld);background:var(--gld3)}
.ph-prev{position:relative;border-radius:9px;overflow:hidden;aspect-ratio:1}
.ph-prev img{width:100%;height:100%;object-fit:cover}
.ph-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="text/babel">

// ═══════════ LOCAL STORAGE DATABASE (works without Supabase) ═══
const LS = {
  get(key, def=null){ try{ const v=localStorage.getItem('brewly_'+key); return v?JSON.parse(v):def; }catch(e){return def;} },
  set(key, val){ try{ localStorage.setItem('brewly_'+key, JSON.stringify(val)); }catch(e){} },
  del(key){ localStorage.removeItem('brewly_'+key); },
};

// Fake auth using localStorage
const localAuth = {
  currentUser: null,
  async signUp(email, password, name){
    const users = LS.get('users', {});
    if(users[email]) throw new Error('Email already registered');
    const id = 'user_' + Date.now();
    const user = { id, email, name, created_at: new Date().toISOString() };
    users[email] = { ...user, password };
    LS.set('users', users);
    LS.set('session', { user, email });
    this.currentUser = user;
    return { user };
  },
  async signIn(email, password){
    const users = LS.get('users', {});
    const u = users[email];
    if(!u) throw new Error('No account found for this email. Create one first.');
    if(u.password !== password) throw new Error('Incorrect password');
    const user = { id:u.id, email:u.email, name:u.name };
    LS.set('session', { user, email });
    this.currentUser = user;
    return { user };
  },
  async signOut(){ LS.del('session'); this.currentUser=null; },
  async getSession(){
    const s = LS.get('session');
    if(!s) return null;
    this.currentUser = s.user;
    return { user: s.user };
  },
};

// Local DB using localStorage
const localDB = {
  async getProfile(id){
    return LS.get('profile_'+id, null);
  },
  async upsertProfile(id, data){
    const existing = LS.get('profile_'+id, {});
    const updated = { ...existing, ...data, id, updated_at: new Date().toISOString() };
    LS.set('profile_'+id, updated);
    return updated;
  },
  async updateProfile(id, data){
    return this.upsertProfile(id, data);
  },
  async getFeed(){
    const posts = LS.get('feed', []);
    return [...posts, ...INITIAL_FEED].slice(0, 50);
  },
  async createPost(post){
    const posts = LS.get('feed', []);
    const newPost = { ...post, id: 'post_'+Date.now(), created_at: new Date().toISOString(), upvotes_count: 0 };
    LS.set('feed', [newPost, ...posts].slice(0, 100));
    return newPost;
  },
  async getUserUpvotes(userId){
    return LS.get('upvotes_'+userId, []);
  },
  async toggleUpvote(userId, postId, isLiked){
    const upvotes = LS.get('upvotes_'+userId, []);
    if(isLiked) LS.set('upvotes_'+userId, upvotes.filter(x=>x!==postId));
    else LS.set('upvotes_'+userId, [...upvotes, postId]);
  },
  async createLog(log){
    const logs = LS.get('logs_'+log.user_id, []);
    const newLog = { ...log, id: 'log_'+Date.now(), created_at: new Date().toISOString() };
    LS.set('logs_'+log.user_id, [newLog, ...logs].slice(0, 100));
    return newLog;
  },
  async getUserLogs(userId){
    return LS.get('logs_'+userId, []).map(l=>({...l, beanName:l.bean_name, cafeName:l.cafe_name, method:l.method, rating:l.rating, date:new Date(l.created_at).toLocaleDateString('en-ZA',{day:'numeric',month:'short'})}));
  },
  async follow(fId, tId){
    const following = LS.get('following_'+fId, []);
    if(!following.includes(tId)) LS.set('following_'+fId, [...following, tId]);
  },
  async unfollow(fId, tId){
    const following = LS.get('following_'+fId, []);
    LS.set('following_'+fId, following.filter(x=>x!==tId));
  },
  async getFollowing(userId){ return LS.get('following_'+userId, []); },
  async getLiveNow(){
    // Return mock users who are currently drinking
    return MOCK_USERS.filter(u=>u.currentDrinking).map(u=>({...u, current_drinking:u.currentDrinking}));
  },
  async getBeans(){ return ALL_BEANS; },
  async getCafes(){ return ALL_CAFES; },
  async getInventory(userId){ return LS.get('inventory_'+userId, []); },
  async addInventoryItem(item){
    const inv = LS.get('inventory_'+item.barista_id, []);
    const newItem = { ...item, id: 'inv_'+Date.now() };
    LS.set('inventory_'+item.barista_id, [...inv, newItem]);
    return newItem;
  },
  async updateInventoryStock(id, stock, userId){
    const inv = LS.get('inventory_'+userId, []);
    LS.set('inventory_'+userId, inv.map(x=>x.id===id?{...x,stock}:x));
  },
  async deleteInventoryItem(id, userId){
    const inv = LS.get('inventory_'+userId, []);
    LS.set('inventory_'+userId, inv.filter(x=>x.id!==id));
  },
  async sendKudos(k){ return { ...k, id: 'kudos_'+Date.now() }; },
  async uploadPhoto(userId, dataUrl){ return dataUrl; }, // store data URL directly
  onAuthChange(cb){ /* local only, no realtime */ },
};

// ─── NOW WIRE SUPABASE IF KEY IS VALID, ELSE USE LOCAL ───────
const SUPA_URL = 'https://ubqcmjetlbnxjumeqivh.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVicWNtamV0bGJueGp1bWVxaXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDY5NzUsImV4cCI6MjA5MTUyMjk3NX0.OCDahb_4XqR7K8GSI_VXX6LUNZ3-HnJO-rMlYMHHdSo';
// Supabase JS v2 needs JWT anon key (eyJ...). Publishable key won't work for auth.
// Using localStorage backend until correct anon key is provided.
const USE_SUPABASE = SUPA_KEY.startsWith('eyJ');
let supa = null;
if(USE_SUPABASE && window.supabase){
  try{ supa = window.supabase.createClient(SUPA_URL, SUPA_KEY); }catch(e){ console.warn('Supabase init failed',e); }
}
console.log(USE_SUPABASE ? '✓ Using Supabase' : '📦 Using localStorage (add anon JWT key to enable Supabase)');

// Unified API — works with both backends
const DB = USE_SUPABASE && supa ? {
  auth: {
    async signUp(e,p,n){ const {data,error}=await supa.auth.signUp({email:e,password:p,options:{data:{name:n}}});if(error)throw error;return data; },
    async signIn(e,p){ const {data,error}=await supa.auth.signInWithPassword({email:e,password:p});if(error)throw error;return data; },
    async signOut(){ await supa.auth.signOut(); },
    async getSession(){ try{const {data}=await supa.auth.getSession();return data.session;}catch(e){return null;} },
    onAuthStateChange(cb){ supa.auth.onAuthStateChange(cb); },
  },
  async getProfile(id){ const {data}=await supa.from('profiles').select('*').eq('id',id).single(); return data; },
  async updateProfile(id,u){ const {data}=await supa.from('profiles').update({...u,updated_at:new Date()}).eq('id',id).select().single(); return data; },
  async getFeed(){ const {data}=await supa.from('feed_posts').select('*, profiles(id,name,handle,avatar_url,current_drinking,tier,is_barista)').order('created_at',{ascending:false}).limit(30); return (data||[]).map(p=>({...p,userId:p.user_id,upvotes:p.upvotes_count||0,liked:false,text:p.text_content,photos:p.photos||[],flavors:p.flavors||[],time:new Date(p.created_at).toLocaleDateString('en-ZA',{day:'numeric',month:'short'})})); },
  async createPost(post){ const {data}=await supa.from('feed_posts').insert(post).select().single(); return data; },
  async getUserUpvotes(uid){ const {data}=await supa.from('post_upvotes').select('post_id').eq('user_id',uid); return (data||[]).map(r=>r.post_id); },
  async toggleUpvote(uid,pid,isLiked){ if(isLiked){await supa.from('post_upvotes').delete().eq('user_id',uid).eq('post_id',pid);}else{await supa.from('post_upvotes').insert({user_id:uid,post_id:pid});} },
  async createLog(log){ const {data}=await supa.from('coffee_logs').insert(log).select().single(); return data; },
  async getUserLogs(uid){ const {data}=await supa.from('coffee_logs').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(20); return (data||[]).map(l=>({...l,beanName:l.bean_name,cafeName:l.cafe_name,date:new Date(l.created_at).toLocaleDateString('en-ZA',{day:'numeric',month:'short'})})); },
  async follow(fId,tId){ await supa.from('follows').insert({follower_id:fId,following_id:tId}); },
  async unfollow(fId,tId){ await supa.from('follows').delete().eq('follower_id',fId).eq('following_id',tId); },
  async getFollowing(uid){ const {data}=await supa.from('follows').select('following_id').eq('follower_id',uid); return (data||[]).map(r=>r.following_id); },
  async getLiveNow(){ const {data}=await supa.from('profiles').select('id,name,handle,avatar_url,tier,current_drinking').not('current_drinking','is',null).limit(20); return data||[]; },
  async getBeans(){ const {data}=await supa.from('beans').select('*, roasteries(name,color,emoji)').eq('active',true); return (data||[]).map(b=>({...b,roasteryName:b.roasteries?.name||'',p30:b.orders_30d||0,trendPct:b.trend_pct||0,week:b.week_orders||0})); },
  async getCafes(){ const {data}=await supa.from('cafes').select('*, roasteries(name,color,emoji)'); return (data||[]).map(c=>({...c,roasteryName:c.roasteries?.name||'',emoji:c.roasteries?.emoji||'☕',color:c.roasteries?.color||'#2A1810',hotBeans:[]})); },
  async getInventory(uid){ const {data}=await supa.from('barista_inventory').select('*').eq('barista_id',uid); return data||[]; },
  async addInventoryItem(item){ const {data}=await supa.from('barista_inventory').insert(item).select().single(); return data; },
  async updateInventoryStock(id,stock){ await supa.from('barista_inventory').update({stock}).eq('id',id); },
  async deleteInventoryItem(id){ await supa.from('barista_inventory').delete().eq('id',id); },
  async sendKudos(k){ const {data}=await supa.from('kudos').insert(k).select().single(); return data; },
  async uploadPhoto(uid,dataUrl){ return dataUrl; },
  subscribeToFeed(onNew){ return supa.channel('feed').on('postgres_changes',{event:'INSERT',schema:'public',table:'feed_posts'},p=>onNew({...p.new,userId:p.new.user_id,upvotes:0,liked:false,text:p.new.text_content,photos:p.new.photos||[],flavors:p.new.flavors||[],time:'Just now'})).subscribe(); },
} : {
  auth: localAuth,
  getProfile: localDB.getProfile.bind(localDB),
  updateProfile: localDB.updateProfile.bind(localDB),
  getFeed: localDB.getFeed.bind(localDB),
  createPost: localDB.createPost.bind(localDB),
  getUserUpvotes: localDB.getUserUpvotes.bind(localDB),
  toggleUpvote: localDB.toggleUpvote.bind(localDB),
  createLog: localDB.createLog.bind(localDB),
  getUserLogs: localDB.getUserLogs.bind(localDB),
  follow: localDB.follow.bind(localDB),
  unfollow: localDB.unfollow.bind(localDB),
  getFollowing: localDB.getFollowing.bind(localDB),
  getLiveNow: localDB.getLiveNow.bind(localDB),

// ═════════════════ UTILS ═══════════════════════════════════════
function Toast({msg,onDone}){useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t)},[]);return <div className="toast">{msg}</div>;}

function MR({pct,size=46}){const d=(pct/100)*360;return <div className="mr" style={{width:size,height:size,background:`conic-gradient(var(--sge) ${d}deg,rgba(30,15,7,.1) ${d}deg)`}}><div className="mr-in" style={{width:size-14,height:size-14,fontSize:10}}>{pct}%</div></div>;}

function Stars({val,onChange,size=26}){
  const[h,sh]=useState(0);
  return <div style={{display:'flex',gap:4}}>
    {[1,2,3,4,5].map(n=><span key={n} className={`star${n<=(h||val)?' lit':''}`} style={{fontSize:size}} onClick={()=>onChange&&onChange(n)} onMouseEnter={()=>onChange&&sh(n)} onMouseLeave={()=>sh(0)}>★</span>)}
  </div>;
}

function matchScore(up,bean){
  const w={acidity:.25,fruitiness:.2,sweetness:.2,body:.15,intensity:.1,aroma:.05,finish:.05};
  let t=0,wt=0;
  Object.entries(w).forEach(([k,v])=>{const u=up[k],b=bean[k];if(u!=null&&b!=null){t+=v*(1-Math.abs(u-b)/10);wt+=v;}});
  return wt>0?Math.round((t/wt)*100):70;
}

function RadarChart({data,size=155}){
  const cx=size/2,cy=size/2,r=size*.37;
  const axes=['Acidity','Fruitiness','Sweetness','Body','Aroma','Finish'];
  const vals=axes.map(a=>data[a.toLowerCase()]||0);
  const pt=(f,i)=>{const a=(i/axes.length)*2*Math.PI-Math.PI/2;return[cx+Math.cos(a)*f,cy+Math.sin(a)*f];};
  const poly=v=>axes.map((_,i)=>pt((v[i]/10)*r,i).join(',')).join(' ');
  return <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
    {[.25,.5,.75,1].map((f,i)=><polygon key={i} points={axes.map((_,j)=>pt(f*r,j).join(',')).join(' ')} fill="none" stroke="rgba(30,15,7,.07)" strokeWidth=".8"/>)}
    {axes.map((_,i)=>{const[x,y]=pt(r,i);return <line key={i} x1={cx} y1={cy} x2={x.toFixed(1)} y2={y.toFixed(1)} stroke="rgba(30,15,7,.07)" strokeWidth=".8"/>;}).flat()}
    <polygon points={poly(vals)} fill="rgba(109,140,106,.15)" stroke="var(--sge)" strokeWidth="2"/>
    {vals.map((v,i)=>{const[x,y]=pt((v/10)*r,i);return <circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="4" fill="var(--sge)"/>;}).flat()}
    {axes.map((l,i)=>{const[x,y]=pt(r+17,i);return <text key={i} x={x.toFixed(1)} y={y.toFixed(1)} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill="var(--ink3)" fontFamily="Inter,sans-serif">{l}</text>;}).flat()}
  </svg>;
}

// ═════════ LIVE MAP ═══════════════════════════════════════════
function LiveMap({height=260}){
  const ref=useRef(null);const inst=useRef(null);const nom=useRef([]);
  const[status,ss]=useState('Tap 📍 to find cafés near you via GPS');
  const[locating,sL]=useState(false);const[located,sLd]=useState(false);
  useEffect(()=>{
    if(inst.current||!window.L||!ref.current)return;
    const L=window.L;
    const map=L.map(ref.current,{zoomControl:false,scrollWheelZoom:true,tap:false}).setView([-26.2041,28.0473],12);
    inst.current=map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    ALL_CAFES.forEach(c=>{
      const hasHot=c.hotBeans.length>0;
      const ico=L.divIcon({html:`<div style="background:${c.color};border-radius:12px;padding:5px 9px;color:#fff;font-size:10px;font-weight:600;font-family:Inter,sans-serif;white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.35);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;gap:4px">${c.emoji} ${c.name.split(',')[0]}${hasHot?'<span style="background:linear-gradient(135deg,#FF4500,#FF8C00);border-radius:999px;padding:1px 5px;font-size:8px">🔥</span>':''}</div>`,className:'',iconAnchor:[0,36]});
      const m=L.marker([c.lat,c.lng],{icon:ico}).addTo(map);
      const bl=c.hotBeans.slice(0,2).map(b=>`<div style="font-size:11px;color:#333;padding:2px 0;border-bottom:1px solid #f5f5f5">${b}</div>`).join('');
      m.bindPopup(`<div style="font-family:Inter,sans-serif;min-width:210px;padding:0"><div style="background:${c.color};padding:10px 13px;border-radius:14px 14px 0 0"><div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:2px">${c.emoji} ${c.roasteryName}</div><div style="font-size:10px;color:rgba(255,255,255,.55)">${c.name}</div></div><div style="padding:10px 13px">${c.hotBeans.length?`<div style="font-size:9px;font-weight:700;color:#7A5010;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">🔥 Hot now</div>${bl}`:''}<div style="margin-top:9px"><button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.addr)}','_blank')" style="width:100%;padding:8px;border-radius:8px;background:#1E0F07;color:#fff;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">📍 Directions</button></div></div></div>`,{maxWidth:280,closeButton:false,offset:[0,-36]});
    });
    setTimeout(()=>map.invalidateSize(),100);
  },[]);
  const locate=()=>{
    if(!navigator.geolocation){ss('Geolocation not available');return;}
    sL(true);ss('Finding your location…');
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      const L=window.L,map=inst.current;
      if(!map||!L)return;
      sL(false);sLd(true);
      const ui=L.divIcon({html:`<div style="width:18px;height:18px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 2px 8px rgba(66,133,244,.6)"></div>`,className:'',iconAnchor:[9,9]});
      L.marker([lat,lng],{icon:ui,zIndexOffset:1000}).addTo(map).bindPopup('<div style="font-family:Inter,sans-serif;font-size:12px;font-weight:600;padding:6px 10px">📍 You are here</div>').openPopup();
      map.setView([lat,lng],14,{animate:true});
      ss('📍 Located · Fetching real coffee shops from OpenStreetMap…');
      fetch(`https://nominatim.openstreetmap.org/search?q=coffee+shop&format=json&limit=25&bounded=1&viewbox=${lng-.06},${lat+.06},${lng+.06},${lat-.06}&addressdetails=1`,{headers:{'User-Agent':'Brewly-App/1.0'}})
        .then(r=>r.json()).then(data=>{
          nom.current.forEach(m=>map.removeLayer(m));nom.current=[];
          const valid=data.filter(p=>p.lat&&p.lon);
          valid.forEach(place=>{
            const nm=L.divIcon({html:`<div style="background:#fff;border:2px solid #C8974A;border-radius:999px;padding:4px 9px;font-size:10px;font-weight:600;font-family:Inter,sans-serif;color:#1E0F07;box-shadow:0 2px 8px rgba(0,0,0,.18);white-space:nowrap">☕ ${place.display_name.split(',')[0]}</div>`,className:'',iconAnchor:[0,24]});
            const mk=L.marker([+place.lat,+place.lon],{icon:nm}).addTo(map);
            mk.bindPopup(`<div style="font-family:Inter,sans-serif;padding:10px 13px;min-width:190px"><div style="font-size:12px;font-weight:600;color:#1E0F07;margin-bottom:4px">☕ ${place.display_name.split(',')[0]}</div><div style="font-size:10px;color:#6B4030;margin-bottom:8px">${place.display_name.split(',').slice(1,3).join(',').trim()}</div><span style="background:#E2F0DF;color:#6D8C6A;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px">OSM verified</span><div style="margin-top:8px"><button onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(place.display_name)}','_blank')" style="width:100%;padding:8px;border-radius:8px;background:#1E0F07;color:#fff;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">📍 Directions</button></div></div>`,{maxWidth:260,closeButton:false});
            nom.current.push(mk);
          });
          ss(`📍 ${valid.length} real coffee shops found + ${ALL_CAFES.length} Brewly partner cafés`);
        }).catch(()=>ss(`📍 Located · ${ALL_CAFES.length} Brewly partner cafés shown`));
    },err=>{sL(false);const m={1:'Location denied',2:'Could not get location',3:'Timed out'};ss(m[err.code]||'Location error');},{timeout:12000,enableHighAccuracy:true});
  };
  return <div style={{position:'relative'}}>
    <div ref={ref} style={{height,width:'100%',borderRadius:14,overflow:'hidden'}}/>
    <button onClick={locate} disabled={locating} style={{position:'absolute',top:10,right:10,zIndex:999,background:located?'var(--sge)':locating?'rgba(250,248,243,.9)':'rgba(250,248,243,.97)',border:`.5px solid ${located?'var(--sge)':locating?'var(--gld)':'var(--b2)'}`,borderRadius:10,padding:'7px 12px',fontSize:12,fontWeight:600,fontFamily:'Inter,sans-serif',cursor:'pointer',color:located?'#fff':'var(--ink)',boxShadow:'var(--sh2)'}}>
      {locating?<span className="spin">⟳</span>:located?'✓ Located':'📍 Locate me'}
    </button>
    <div style={{position:'absolute',bottom:8,left:8,right:52,zIndex:999,background:'rgba(250,248,243,.94)',border:'.5px solid var(--b2)',borderRadius:7,padding:'5px 9px',fontSize:10,color:'var(--ink3)',lineHeight:1.4}}>{status}</div>
  </div>;
}

// ═════════ KUDOS MODAL ════════════════════════════════════════
function KudosModal({barista,onClose,toast}){

  const send=()=>{if(!rating){toast('Please give a star rating first');return;}setSent(true);setTimeout(()=>{toast(`Kudos sent to ${barista.name}! ☕ +5 pts`);onClose();},1400);};
  return <div className="mb" onClick={onClose}><div className="ms" onClick={e=>e.stopPropagation()}>

          <div>{barista.specialties.slice(0,2).map(s=><span key={s} className="chip sge" style={{fontSize:10,padding:'2px 7px',margin:'0 3px 0 0'}}>{s}</span>)}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:13,color:'var(--gld)',fontWeight:700}}>★ {barista.rating}</div>
          <div style={{fontSize:10,color:'var(--ink3)'}}>{barista.kudos} kudos</div>
        </div>
      </div>
      <div className="lbl" style={{marginBottom:8}}>Rate this barista</div>

      <div style={{marginBottom:14,display:'flex',flexWrap:'wrap'}}>

        <textarea className="ta" placeholder="Tell them what made your experience special…" value={msg} onChange={e=>sMsg(e.target.value)}/>
      </div>
      <div style={{background:'var(--cr2)',borderRadius:10,padding:'10px 12px',marginBottom:14}}>
        <div className="lbl" style={{marginBottom:6}}>Recent community kudos</div>
        {barista.recent.map((r,i)=><div key={i} style={{fontSize:11,color:'var(--ink3)',fontStyle:'italic',marginBottom:4}}>"{r}"</div>)}
      </div>

// ═════════ PROFILE ════════════════════════════════════════════
function Profile({user,setUser,logs,following,onGoTo,toast}){
  const[showQR,sqr]=useState(false);const[showCD,sCD]=useState(false);
  const TIERS=['Coffee Curious','Flavour Explorer','Brew Guide','Palate Pro','Craft Authority'];
  const TIER_PTS=[0,100,500,2000,5000];
  const ti=TIERS.indexOf(user.tier);
  const pct=Math.min(100,Math.round((user.points/(TIER_PTS[ti+1]||5000))*100));
  return <div className="fi">
    <div style={{background:'var(--ink)',padding:'22px 18px 28px',color:'#fff'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
        <div style={{width:50,height:50,borderRadius:'50%',background:'rgba(200,151,74,.15)',border:'2px solid rgba(200,151,74,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>☕</div>
        
      </div>
      <div className="serif" style={{fontSize:21,color:'#fff',marginBottom:4}}>{user.name}'s Profile</div>
      <div style={{display:'inline-flex',alignItems:'center',gap:5,background:'rgba(109,140,106,.2)',border:'.5px solid var(--sge2)',color:'var(--sge2)',fontSize:10,letterSpacing:.8,textTransform:'uppercase',padding:'3px 10px',borderRadius:999,marginBottom:11,fontWeight:600}}>✦ {user.tier}</div>
      <div style={{display:'flex',marginBottom:12}}>
        {[[user.logs,'logs'],[following.length,'following'],[user.points,'pts']].map(([n,l])=>(
          <div key={l} style={{flex:1,textAlign:'center',borderRight:'.5px solid rgba(255,255,255,.1)',padding:'5px 4px',cursor:l==='following'?'pointer':'default'}} onClick={()=>l==='following'&&onGoTo('social')}>
            <div className="serif" style={{fontSize:19,color:'#fff'}}>{n}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.4)'}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:10,display:'flex',justifyContent:'space-between',color:'rgba(255,255,255,.3)',marginBottom:4}}><span>{user.tier}</span><span>{(TIER_PTS[ti+1]||5000)-user.points} pts to {TIERS[ti+1]||'max'}</span></div>
      <div style={{height:3,background:'rgba(255,255,255,.08)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:'var(--sge2)',borderRadius:2}}/></div>
    </div>
    {/* Currently Drinking on profile */}
    <div style={{margin:'0 16px 13px',marginTop:-14}}>
      <div className="card" style={{padding:'12px 14px',borderLeft:'3px solid var(--gld)',cursor:'pointer'}} onClick={()=>sCD(true)}>

          ?<><div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}><span className="cd-dot" style={{width:6,height:6}}/><span style={{fontSize:10,fontWeight:700,color:'var(--gld)',letterSpacing:.8,textTransform:'uppercase'}}>Currently drinking</span></div>
            <div className="serif" style={{fontSize:14,color:'var(--ink)',marginBottom:2}}>{user.currentDrinking.bean}</div>
            <div style={{fontSize:11,color:'var(--ink3)'}}>{user.currentDrinking.cafe} · {user.currentDrinking.method} · {user.currentDrinking.since}</div>
          </>
          :<div style={{display:'flex',alignItems:'center',gap:9}}><div style={{fontSize:18}}>☕</div><div style={{fontSize:12,color:'var(--ink3)'}}>Tap to set <strong style={{color:'var(--ink)'}}>Currently Drinking</strong></div></div>
        }
      </div>
    </div>
    {/* Loyalty Card */}
    <div onClick={()=>sqr(true)} style={{background:'linear-gradient(135deg,#2A1508,#4A2C14)',borderRadius:13,padding:15,color:'#fff',margin:'0 16px 13px',cursor:'pointer',position:'relative',overflow:'hidden',boxShadow:'var(--sh2)'}}>

      <div style={{position:'relative',zIndex:1}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div className="serif" style={{fontSize:16}}>Brew<em style={{fontStyle:'italic',color:'var(--gld2)'}}>ly</em> Card</div>
          <span className="pts">{user.points} pts</span>
        </div>
        <div className="serif" style={{fontSize:13,marginBottom:2}}>{user.name}</div>
        <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:9}}>{user.tier.toUpperCase()} · MEMBER</div>
        <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:3}}>Next free coffee in {Math.max(0,500-user.points)} pts</div>
        <div style={{height:3,background:'rgba(255,255,255,.12)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,(user.points/500)*100)}%`,background:'var(--gld)',borderRadius:2}}/></div>

      </div>
    </div>
    <div className="px16">
      <div className="lbl" style={{marginBottom:8}}>Flavour radar</div>
      <div className="card" style={{padding:14,marginBottom:13}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <RadarChart data={user.profile} size={150}/>
          <div style={{flex:1}}>
            {[['Acidity',user.profile.acidity,'#6D8C6A'],['Fruitiness',user.profile.fruitiness,'#D4614A'],['Sweetness',user.profile.sweetness,'#C8974A'],['Body',user.profile.body,'#8B6355'],['Aroma',user.profile.aroma,'#9DB89A']].map(([l,v,c])=>(
              <div key={l} style={{marginBottom:7}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--ink3)',marginBottom:2}}><span>{l}</span><span style={{fontWeight:600,color:'var(--ink)'}}>{v.toFixed(1)}</span></div>

              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="lbl" style={{marginBottom:8}}>You enjoy</div>
      <div style={{marginBottom:11}}>{user.preferences.likes.map(l=><span key={l} className="chip sge">{l}</span>)}</div>
      <div className="lbl" style={{marginBottom:8}}>You avoid</div>
      <div style={{marginBottom:13}}>{user.preferences.avoids.map(a=><span key={a} className="chip rst">{a}</span>)}</div>
      <div className="lbl" style={{marginBottom:8}}>Your top bean matches</div>
      <div className="card" style={{marginBottom:16}}>
        {ALL_BEANS.sort((a,b)=>matchScore(user.profile,b)-matchScore(user.profile,a)).slice(0,4).map((b,i,arr)=>(
          <div key={b.id} style={{padding:'10px 13px',borderBottom:i<arr.length-1?'.5px solid var(--b)':'none',display:'flex',alignItems:'center',gap:9}}>
            <div style={{flex:1,minWidth:0}}>
              <div className="serif" style={{fontSize:13,color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:1}}>{b.name}</div>
              <div style={{fontSize:10,color:'var(--ink3)'}}>{b.roasteryName} · {b.price}</div>
            </div>
            <MR pct={matchScore(user.profile,b)} size={36}/>
          </div>
        ))}
      </div>
      {logs.length>0&&<>
        <div className="lbl" style={{marginBottom:8}}>Recent logs</div>
        <div className="card" style={{marginBottom:16}}>
          {logs.slice(-4).reverse().map((l,i,arr)=>(
            <div key={l.id||i} style={{padding:'10px 13px',borderBottom:i<arr.length-1?'.5px solid var(--b)':'none',display:'flex',alignItems:'center',gap:9}}>
              <div style={{flex:1,minWidth:0}}>
                <div className="serif" style={{fontSize:13,color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.beanName||'Coffee'}</div>
                <div style={{fontSize:10,color:'var(--ink3)'}}>{l.cafeName} · {l.method} · {l.date}</div>
              </div>
              {l.rating>0&&<span style={{fontSize:10,color:'var(--gld)',flexShrink:0}}>{'★'.repeat(l.rating)}</span>}
            </div>
          ))}
        </div>
      </>}
    </div>
    {showQR&&<div className="mb" onClick={()=>sqr(false)}><div className="ms" onClick={e=>e.stopPropagation()}>
      <div className="mh"/>
      <div style={{textAlign:'center',marginBottom:14}}>
        <div className="serif" style={{fontSize:19,color:'var(--ink)',marginBottom:3}}>{user.name}'s Taste Card</div>
        <div style={{fontSize:11,color:'var(--ink3)',marginBottom:12}}>Show to your barista for an instant personalised recommendation</div>
        <div style={{display:'inline-block',background:'#fff',borderRadius:11,padding:11,boxShadow:'var(--sh2)',marginBottom:9}}>
          <svg width="95" height="95" viewBox="0 0 95 95"><rect width="95" height="95" fill="white"/>
            {Array.from({length:7},(_,r)=>Array.from({length:7},(_,c)=>(r+c+r*c*3)%7<3?<rect key={`${r}-${c}`} x={c*12+5} y={r*12+5} width="10" height="10" rx="2" fill="#1E0F07"/>:null).flat())}
          </svg>
        </div>
        <div style={{fontSize:10,color:'var(--ink3)',marginBottom:13}}>BRW-{user.name.toUpperCase().replace(' ','-')}-{user.points}</div>
      </div>
      <div style={{display:'flex',gap:9,marginBottom:12}}>
        <div style={{flex:1,background:'var(--sge3)',borderRadius:11,padding:12}}>
          <div className="lbl" style={{color:'var(--sge)',marginBottom:6}}>✓ Prefers</div>
          {user.preferences.likes.slice(0,4).map(l=><div key={l} style={{fontSize:11,color:'var(--ink)',marginBottom:3,fontWeight:500}}>{l}</div>)}

        <div style={{flex:1,background:'var(--rst3)',borderRadius:11,padding:12}}>
          <div className="lbl" style={{color:'var(--rst)',marginBottom:6}}>✗ Avoids</div>
          {user.preferences.avoids.map(a=><div key={a} style={{fontSize:11,color:'var(--ink)',marginBottom:3,fontWeight:500}}>{a}</div>)}

        </div>
      </div>
      <div style={{background:'var(--gld3)',borderRadius:11,padding:'10px 12px',marginBottom:12,border:'.5px solid rgba(200,151,74,.35)'}}>

          <div key={b.id} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4,color:'var(--ink)'}}>
            <span style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{b.name}</span>

      <button className="btn btn-dk" onClick={()=>{toast('Profile link copied!');sqr(false);}}>Copy Share Link</button>

    {showCD&&<div className="mb" onClick={()=>sCD(false)}><div className="ms" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="serif" style={{fontSize:18,color:'var(--ink)',marginBottom:12}}>Set Currently Drinking</div>

    <div style={{height:20}}/>
  </div>;

// Build taste profile from quiz answers
function buildProfileFromAnswers(answers) {
  const base = { acidity:5, fruitiness:5, sweetness:5, body:5, intensity:5, aroma:5, finish:5 };
  const tags = new Set();

  answers.forEach(({ questionId, selectedOptions }) => {
    const question = FLAVOR_QUESTIONS.find(q => q.id === questionId);
    if (!question) return;
    selectedOptions.forEach(optIdx => {
      const opt = question.options[optIdx];
      if (!opt) return;
      // Apply deltas
      ['acidity','fruitiness','sweetness','body','intensity','aroma','finish'].forEach(axis => {
        if (opt[axis] !== undefined) {
          base[axis] = Math.max(0, Math.min(10, base[axis] + opt[axis]));
        }
      });
      opt.tags.forEach(t => tags.add(t));
    });
  });

  // Normalise to 0-10
  Object.keys(base).forEach(k => {
    base[k] = Math.max(1, Math.min(10, Math.round(base[k] * 10) / 10));
  });

  // Determine archetype
  let bestArchetype = null, bestScore = -1;
  Object.entries(SA_FLAVOR_ARCHETYPES).forEach(([name, arch]) => {
    const score = matchScore(base, arch.profile);
    if (score > bestScore) { bestScore = score; bestArchetype = name; }
  });

  // Build likes/avoids from tags
  const avoidTags = [...tags].filter(t => t.startsWith('avoid ')).map(t => t.replace('avoid ',''));
  const likeTags = [...tags].filter(t => !t.startsWith('avoid ') && t !== 'open');

  return {
    ...base,
    archetype: bestArchetype,
    archetypeScore: bestScore,
    likes: likeTags.slice(0, 5),
    avoids: avoidTags.slice(0, 3),
    tags: [...tags],
  };
}

    const next = () => {
      if (selectedOpts.length === 0) return;
      const newAnswers = [...quizAnswers, { questionId: q.id, selectedOptions: selectedOpts }];
      setQuizAnswers(newAnswers);
      setSelectedOpts([]);
      if (isLast) {
        const profile = buildProfileFromAnswers(newAnswers);
        setBuiltProfile(profile);
        setStep('result');
      } else {
        setCurrentQ(c => c + 1);
      }
    };

    return (
      <div style={{ minHeight: '100%', background: 'var(--ink)', display: 'flex', flexDirection: 'column' }}>
        {/* Progress bar */}
        <div style={{ height: 3, background: 'rgba(255,255,255,.08)' }}>
          <div style={{ height: '100%', width: `${progress}%`, background: 'var(--gld)', transition: 'width .4s ease', borderRadius: 2 }} />
        </div>

        <div style={{ padding: '28px 28px 0', flex: 1, display: 'flex', flexDirection: 'column' }}>
          {/* Step counter */}
          <div style={{ fontSize: 11, color: 'rgba(255,255,255,.3)', marginBottom: 8, letterSpacing: 1 }}>
            {currentQ + 1} / {FLAVOR_QUESTIONS.length}
          </div>

          {/* Question */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontSize: 36, marginBottom: 14 }}>{q.emoji}</div>
            <div className="serif" style={{ fontSize: 24, color: '#fff', lineHeight: 1.3, marginBottom: q.multi ? 8 : 0 }}>{q.question}</div>
            {q.multi && <div style={{ fontSize: 11, color: 'rgba(255,255,255,.35)', marginTop: 6 }}>Select all that apply</div>}
          </div>

          {/* Options */}
          <div style={{ flex: 1 }}>
            {q.options.map((opt, i) => {
              const sel = selectedOpts.includes(i);
              return (
                <button key={i} onClick={() => toggleOpt(i)}
                  style={{ width: '100%', background: sel ? 'rgba(200,151,74,.15)' : 'rgba(255,255,255,.05)', border: `.5px solid ${sel ? 'var(--gld)' : 'rgba(255,255,255,.1)'}`, borderRadius: 13, padding: '15px 16px', marginBottom: 9, cursor: 'pointer', textAlign: 'left', display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 22, height: 22, borderRadius: q.multi ? 6 : '50%', border: `2px solid ${sel ? 'var(--gld)' : 'rgba(255,255,255,.2)'}`, background: sel ? 'var(--gld)' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    {sel && <div style={{ width: 8, height: 8, borderRadius: q.multi ? 2 : '50%', background: '#fff' }} />}
                  </div>
                  <span style={{ fontSize: 14, color: sel ? '#fff' : 'rgba(255,255,255,.7)', fontWeight: sel ? 500 : 400 }}>{opt.label}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Next button */}
        <div style={{ padding: '16px 28px 36px' }}>
          <button onClick={next} disabled={selectedOpts.length === 0}
            style={{ width: '100%', padding: '15px', borderRadius: 12, background: selectedOpts.length > 0 ? 'var(--gld)' : 'rgba(255,255,255,.08)', color: selectedOpts.length > 0 ? '#fff' : 'rgba(255,255,255,.3)', border: 'none', fontFamily: 'Inter,sans-serif', fontSize: 15, fontWeight: 600, cursor: selectedOpts.length > 0 ? 'pointer' : 'default' }}>
            {isLast ? 'Build my taste profile →' : 'Next →'}
          </button>
        </div>
      </div>
    );
  }

  // ── RESULT STEP ───────────────────────────────────────────
  if (step === 'result' && builtProfile) {
    const arch = SA_FLAVOR_ARCHETYPES[builtProfile.archetype];
    const topBeans = ALL_BEANS.filter(b => (builtProfile.archetype === 'The Bright Ethiopian' ? ['f2','bt1','r1','t1','o1'] : builtProfile.archetype === 'The Bold Kenyan' ? ['r2','bt2','o2'] : builtProfile.archetype === 'The Natural Adventurer' ? ['f1','f3'] : builtProfile.archetype === 'The Chocolate Comforter' ? ['sm1','ml1'] : ['o1','t1']).includes(b.id)).slice(0, 3);

    return (
      <div style={{ minHeight: '100%', background: 'var(--ink)', overflowY: 'auto' }}>
        {/* Hero */}
        <div style={{ background: 'linear-gradient(160deg,#1A0A04,#2C1208)', padding: '52px 28px 28px', textAlign: 'center' }}>
          <div style={{ fontSize: 56, marginBottom: 12 }}>✦</div>
          <div className="serif" style={{ fontSize: 28, color: '#fff', marginBottom: 6 }}>{builtProfile.archetype}</div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,.5)', lineHeight: 1.6, marginBottom: 16 }}>{arch?.desc}</div>
          <div style={{ display: 'flex', gap: 6, justifyContent: 'center', flexWrap: 'wrap' }}>
            {(builtProfile.likes || []).slice(0, 4).map(t => (
              <span key={t} style={{ background: 'rgba(200,151,74,.2)', border: '.5px solid rgba(200,151,74,.35)', color: 'var(--gld2)', padding: '4px 10px', borderRadius: 999, fontSize: 11 }}>{t}</span>
            ))}
          </div>
        </div>

        <div style={{ padding: '20px 20px 12px' }}>
          {/* Radar */}
          <div style={{ background: '#fff', borderRadius: 14, padding: '14px', marginBottom: 14, display: 'flex', gap: 12, alignItems: 'center' }}>
            <RadarChart data={builtProfile} size={140} />
            <div style={{ flex: 1 }}>
              <div className="lbl" style={{ marginBottom: 8 }}>Your profile</div>
              {[['Acidity', builtProfile.acidity, '#6D8C6A'], ['Fruitiness', builtProfile.fruitiness, '#D4614A'], ['Sweetness', builtProfile.sweetness, '#C8974A'], ['Body', builtProfile.body, '#8B6355'], ['Intensity', builtProfile.intensity, '#7C3AED']].map(([l, v, c]) => (
                <div key={l} style={{ marginBottom: 6 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--ink3)', marginBottom: 2 }}><span>{l}</span><span style={{ fontWeight: 600, color: 'var(--ink)' }}>{v.toFixed(1)}</span></div>
                  <div style={{ height: 3, background: 'var(--b)', borderRadius: 2, overflow: 'hidden' }}><div style={{ height: '100%', width: `${v * 10}%`, background: c, borderRadius: 2 }} /></div>
                </div>
              ))}
            </div>
          </div>

          {/* Matched beans */}
          <div className="lbl" style={{ marginBottom: 10 }}>Your top bean matches</div>
          {ALL_BEANS.sort((a, b) => matchScore(builtProfile, b) - matchScore(builtProfile, a)).slice(0, 4).map(bean => (
            <div key={bean.id} style={{ background: '#fff', borderRadius: 12, border: '.5px solid var(--b)', padding: '12px 14px', marginBottom: 9, display: 'flex', gap: 10, alignItems: 'center' }}>
              <div style={{ flex: 1 }}>
                <div className="serif" style={{ fontSize: 14, color: 'var(--ink)', marginBottom: 2 }}>{bean.name}</div>
                <div style={{ fontSize: 10, color: 'var(--ink3)', marginBottom: 5 }}>{bean.roasteryName} · {bean.origin} · {bean.price}</div>
                <div>{bean.flavors.slice(0, 3).map(f => <span key={f} className="chip sge" style={{ fontSize: 10, padding: '2px 6px', margin: '0 3px 0 0' }}>{f}</span>)}</div>
              </div>
              <MR pct={matchScore(builtProfile, bean)} size={44} />
            </div>
          ))}

          {/* Avoids */}
          {(builtProfile.avoids || []).length > 0 && (
            <div style={{ background: 'var(--rst3)', borderRadius: 11, padding: '11px 13px', borderLeft: '2px solid var(--rst2)', marginBottom: 14 }}>
              <div className="lbl" style={{ color: 'var(--rst)', marginBottom: 5 }}>We'll filter out</div>
              <div>{builtProfile.avoids.map(a => <span key={a} className="chip rst" style={{ fontSize: 11, margin: '0 4px 0 0' }}>✗ {a}</span>)}</div>
            </div>
          )}

          <button onClick={async () => {
            setLoading(true);
            try {
              // Sign in to get user id (they signed up in register step)
              const data = await DB.auth.signIn(regData.email, regData.password);
              const uid = data?.user?.id || data?.user?.id;
              // Save full profile with taste data
              const profile = await DB.updateProfile(uid, {
                id: uid, name: regData.name, city: regData.city,
                tier: 'Coffee Curious', points: 0, logs_count: 0, cafes_count: 0,
                acidity: builtProfile.acidity, fruitiness: builtProfile.fruitiness,
                sweetness: builtProfile.sweetness, body: builtProfile.body,
                intensity: builtProfile.intensity, aroma: builtProfile.aroma, finish: builtProfile.finish,
                likes: builtProfile.likes, avoids: builtProfile.avoids,
                current_drinking: null, is_barista: false,
              });
              onComplete(data.user, { ...profile, archetype: builtProfile.archetype }, 'customer');
            } catch (e) { setErr(e.message); }
            setLoading(false);
          }} disabled={loading}
            style={{ width: '100%', padding: '15px', borderRadius: 12, background: 'var(--gld)', color: '#fff', border: 'none', fontFamily: 'Inter,sans-serif', fontSize: 15, fontWeight: 600, cursor: loading ? 'default' : 'pointer', opacity: loading ? .7 : 1, marginBottom: 8 }}>
            {loading ? 'Saving your profile…' : 'Enter Brewly ☕'}
          </button>
          {err && <div style={{ fontSize: 12, color: 'var(--rst2)', textAlign: 'center' }}>{err}</div>}
          <div style={{ height: 24 }} />
        </div>
      </div>
    );
  }
  return null;
}

// SIGN IN SCREEN (returning users)

function SignInScreen({ onAuth, onNewUser, toast }) {
  const [email, sEmail] = useState('');
  const [password, sPassword] = useState('');
  const [loading, sLoading] = useState(false);
  const [err, sErr] = useState('');

  const submit = async () => {
    if (!email || !password) { sErr('Email and password required'); return; }
    sLoading(true); sErr('');
    try {
      const data = await DB.auth.signIn(email, password);
      const uid = data?.user?.id;
      const profile = await DB.getProfile(uid);
      onAuth(data.user, profile);
    } catch (e) { sErr(e.message || 'Sign in failed'); }
    sLoading(false);
  };

  return (
    <div style={{ minHeight: '100%', background: 'var(--ink)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '40px 28px', color: '#fff' }}>
      <div className="serif" style={{ fontSize: 40, letterSpacing: '-.5px', marginBottom: 4 }}>Brew<em style={{ fontStyle: 'italic', color: 'var(--gld2)' }}>ly</em></div>
      <div style={{ fontSize: 12, color: 'rgba(255,255,255,.4)', marginBottom: 36 }}>Welcome back</div>

      {!USE_SUPABASE && <div style={{ background: 'rgba(200,151,74,.12)', border: '.5px solid rgba(200,151,74,.3)', borderRadius: 12, padding: '11px 13px', marginBottom: 20, width: '100%', fontSize: 11, color: 'rgba(255,200,100,.8)', lineHeight: 1.65 }}>
        📦 Running on local storage — add Supabase anon key for cloud sync
      </div>}

      <div style={{ width: '100%' }}>
        {[['Email', 'email', 'email', 'you@email.com'], ['Password', 'password', 'password', '••••••••']].map(([l, key, type, ph]) => (
          <div key={key} style={{ marginBottom: 12 }}>
            <label style={{ fontSize: 10, color: 'rgba(255,255,255,.4)', display: 'block', marginBottom: 5, letterSpacing: 1, textTransform: 'uppercase' }}>{l}</label>
            <input type={type} value={key === 'email' ? email : password} onChange={e => key === 'email' ? sEmail(e.target.value) : sPassword(e.target.value)} placeholder={ph}
              style={{ width: '100%', padding: '13px 15px', borderRadius: 11, border: '.5px solid rgba(255,255,255,.12)', background: 'rgba(255,255,255,.07)', color: '#fff', fontSize: 14, fontFamily: 'Inter,sans-serif', outline: 'none' }}
              onKeyDown={e => e.key === 'Enter' && submit()} />
          </div>
        ))}
        {err && <div style={{ background: 'rgba(168,56,32,.3)', borderRadius: 9, padding: '10px 13px', marginBottom: 14, fontSize: 12, color: '#FCA5A5', borderLeft: '2px solid var(--rst2)' }}>{err}</div>}
        <button onClick={submit} disabled={loading}
          style={{ width: '100%', padding: '14px', borderRadius: 11, background: 'var(--gld)', color: '#fff', border: 'none', fontFamily: 'Inter,sans-serif', fontSize: 14, fontWeight: 600, cursor: loading ? 'default' : 'pointer', opacity: loading ? .7 : 1, marginBottom: 14 }}>
          {loading ? 'Signing in…' : 'Sign in →'}
        </button>
        <button onClick={onNewUser}
          style={{ width: '100%', padding: '14px', borderRadius: 11, background: 'rgba(255,255,255,.06)', color: 'rgba(255,255,255,.6)', border: '.5px solid rgba(255,255,255,.1)', fontFamily: 'Inter,sans-serif', fontSize: 14, cursor: 'pointer' }}>
          Create new account
        </button>
      </div>
    </div>
  );
}

function App() {
  const [authUser, setAuthUser] = useState(null);
  const [user, setUserState] = useState(null);
  const [authMode, setAuthMode] = useState('onboarding'); // onboarding | signin
  const [feed, setFeed] = useState(INITIAL_FEED);
  const [following, setFollowing] = useState([]);
  const [logs, setLogs] = useState([]);
  const [inventory, setInventory] = useState([
    { id: 'inv1', name: 'Antimaceration Geisha by El Paraíso', roastery: 'Father Coffee', origin: 'Colombia', process: 'Vacuum Fermented', roast: 'Light', flavors: ['Guava', 'Pineapple', 'Passionfruit'], stock: 'High', acidity: 8.5, fruitiness: 10, body: 8, sweetness: 8, intensity: 9, autoLoaded: true },
    { id: 'inv2', name: 'Ethiopia Single Origin', roastery: 'Bean There', origin: 'Ethiopia', process: 'Washed', roast: 'Light-Medium', flavors: ['Jasmine', 'Bergamot', 'Lemon'], stock: 'Medium', acidity: 8.5, fruitiness: 8.5, body: 3.5, sweetness: 6.5, intensity: 4.5, autoLoaded: true },
    { id: 'inv3', name: 'Campbell Road House Blend', roastery: 'Seam Coffee', origin: 'Ethiopia/Colombia', process: 'Mixed', roast: 'Medium', flavors: ['Milk chocolate', 'Treacle sugar'], stock: 'Low', acidity: 5.5, fruitiness: 5, body: 6.5, sweetness: 8.5, intensity: 6, autoLoaded: true },
  ]);
  const [screen, sScreen] = useState('home');
  const [logging, sLogging] = useState(false);
  const [success, sSuccess] = useState(null);
  const [toast, sToast] = useState('');
  const [appLoading, sAppLoading] = useState(true);
  const [upvoted, setUpvoted] = useState(new Set());

  const showToast = m => sToast(m);

  // ── Session check on mount ─────────────────────────────────
  useEffect(() => {
    (async () => {
      try {
        const session = await DB.auth.getSession();
        if (session && session.user) {
          const profile = await DB.getProfile(session.user.id);
          setAuthUser(session.user);
          setUserState(profile || buildDefault(session.user));
          await loadData(session.user.id);
        }
      } catch (e) { console.warn('Session:', e); }
      sAppLoading(false);
    })();

    if (USE_SUPABASE && supa) {
      supa.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
          const profile = await DB.getProfile(session.user.id);
          setAuthUser(session.user);
          setUserState(profile || buildDefault(session.user));
          await loadData(session.user.id);
          sAppLoading(false);
        }
        if (event === 'SIGNED_OUT') { setAuthUser(null); setUserState(null); sAppLoading(false); }
      });
    }

    // Realtime beans subscription
    if (USE_SUPABASE && supa) {
      const beanSub = supa.channel('beans-updates')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'beans' }, () => {
          // Silently refresh beans in background
          DB.getBeans().then(beans => { if (beans.length > 0) console.log('Beans updated from Supabase:', beans.length); }).catch(() => {});
        }).subscribe();
      return () => supa.removeChannel(beanSub);
    }
  }, []);

  const buildDefault = (user) => ({
    id: user.id, name: user.name || user.email?.split('@')[0] || 'Coffee Lover',
    city: 'Johannesburg', tier: 'Coffee Curious', points: 0,
    logs_count: 0, cafes_count: 0,
    acidity: 5, fruitiness: 5, sweetness: 5, body: 5, intensity: 5, aroma: 5, finish: 5,
    likes: [], avoids: [], current_drinking: null, is_barista: false,
  });

  const loadData = async (userId) => {
    try {
      const [feedData, followingIds, logsData, upvoteIds] = await Promise.all([
        DB.getFeed().catch(() => []),
        DB.getFollowing(userId).catch(() => []),
        DB.getUserLogs(userId).catch(() => []),
        DB.getUserUpvotes(userId).catch(() => []),
      ]);
      if (feedData.length > 0) setFeed(feedData);
      setFollowing(followingIds);
      setLogs(logsData);
      setUpvoted(new Set(upvoteIds));
      const inv = await DB.getInventory(userId).catch(() => []);
      if (inv.length > 0) setInventory(inv);
      // Realtime feed
      if (USE_SUPABASE && supa) {
        supa.channel('feed-rt')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'feed_posts' }, p => {
            const post = { ...p.new, userId: p.new.user_id, upvotes: 0, liked: false, text: p.new.text_content, photos: p.new.photos || [], flavors: p.new.flavors || [], time: 'Just now' };
            setFeed(prev => [post, ...prev.slice(0, 49)]);
          }).subscribe();
      }
    } catch (e) { console.warn('Load data:', e); }
  };

  const handleOnboardingComplete = async (authUserObj, profile, mode) => {
    if (mode === 'signin') { setAuthMode('signin'); return; }
    setAuthUser(authUserObj);
    setUserState(profile || buildDefault(authUserObj));
    if (authUserObj) await loadData(authUserObj.id);
  };

  const handleSignIn = async (authUserObj, profile) => {
    setAuthUser(authUserObj);
    setUserState(profile || buildDefault(authUserObj));
    if (authUserObj) await loadData(authUserObj.id);
  };

  const setUser = (updOrVal) => {
    setUserState(prev => {
      const next = typeof updOrVal === 'function' ? updOrVal(prev) : updOrVal;
      if (authUser && next) {
        DB.updateProfile(authUser.id, {
          name: next.name, city: next.city, tier: next.tier, points: next.points,
          logs_count: next.logs || next.logs_count || 0, cafes_count: next.cafes || next.cafes_count || 0,
          acidity: next.profile?.acidity, fruitiness: next.profile?.fruitiness,
          sweetness: next.profile?.sweetness, body: next.profile?.body,
          intensity: next.profile?.intensity, aroma: next.profile?.aroma, finish: next.profile?.finish,
          likes: next.preferences?.likes, avoids: next.preferences?.avoids,
          current_drinking: next.currentDrinking || null,
        }).catch(e => console.warn('Profile save:', e));
      }
      return next;
    });
  };

  const handleFollow = async (id) => {
    if (!authUser) { showToast('Sign in to follow'); return; }
    const isF = following.includes(id);
    setFollowing(f => isF ? f.filter(x => x !== id) : [...f, id]);
    if (isF) await DB.unfollow(authUser.id, id).catch(() => {});
    else await DB.follow(authUser.id, id).catch(() => {});
  };

  const handleUpvote = async (postId) => {
    if (!authUser) { showToast('Sign in to upvote'); return; }
    const isLiked = upvoted.has(postId);
    setFeed(f => f.map(x => x.id === postId ? { ...x, upvotes: (x.upvotes || 0) + (isLiked ? -1 : 1), liked: !isLiked } : x));
    setUpvoted(prev => { const s = new Set(prev); isLiked ? s.delete(postId) : s.add(postId); return s; });
    await DB.toggleUpvote(authUser.id, postId, isLiked).catch(() => {});
  };

  const handleLog = async (log) => {
    sLogging(false); sSuccess(log);
    setLogs(l => [{ ...log, date: new Date().toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' }) }, ...l]);
    setUserState(u => u ? { ...u, logs: (u.logs_count || u.logs || 0) + 1, logs_count: (u.logs_count || 0) + 1, points: (u.points || 0) + log.pts } : u);
    if (!authUser) return;
    try {
      const saved = await DB.createLog({ user_id: authUser.id, bean_name: log.beanName, cafe_name: log.cafeName, roastery_name: log.roasteryName, method: log.method, rating: log.rating, liked: log.liked, review: log.review, kudos_message: log.kudos, photos: [], points_earned: log.pts });
      if (log.review) {
        await DB.createPost({ user_id: authUser.id, type: 'review', bean_name: log.beanName, cafe_name: log.cafeName, method: log.method, text_content: log.review, rating: log.rating, photos: [], flavors: [], pts: log.pts, upvotes_count: 0 });
      }
    } catch (e) { console.warn('Log save:', e); }
  };

  const handleSignOut = async () => {
    await DB.auth.signOut().catch(() => {});
    setAuthUser(null); setUserState(null); setFeed(INITIAL_FEED); setFollowing([]); setLogs([]);
    setAuthMode('onboarding'); sScreen('home'); showToast('Signed out');
  };

  const NAV = [
    { id: 'home', lbl: 'Home', ic: () => <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg> },
    { id: 'discover', lbl: 'Discover', ic: () => <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg> },
    { id: 'log', lbl: 'Log', ic: () => <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg> },
    { id: 'social', lbl: 'Social', ic: () => <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" /></svg> },
    { id: 'profile', lbl: 'Profile', ic: () => <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" /></svg> },
  ];

  // Loading
  if (appLoading) return (
    <div className="shell" style={{ background: 'var(--ink)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
      <div className="serif" style={{ fontSize: 38, color: '#fff', letterSpacing: '-.5px' }}>Brew<em style={{ fontStyle: 'italic', color: 'var(--gld2)' }}>ly</em></div>
      <div style={{ width: 28, height: 28, border: '3px solid rgba(255,255,255,.1)', borderTop: '3px solid var(--gld)', borderRadius: '50%', animation: 'spin .8s linear infinite' }} />
    </div>
  );

  // Auth gate
  if (!authUser || !user) return (
    <div className="shell">
      <div className="view">
        {authMode === 'onboarding'
          ? <OnboardingFlow onComplete={handleOnboardingComplete} toast={showToast} />
          : <SignInScreen onAuth={handleSignIn} onNewUser={() => setAuthMode('onboarding')} toast={showToast} />}
      </div>
      {toast && <Toast msg={toast} onDone={() => sToast('')} />}
    </div>
  );

  const hideNav = logging || !!success || screen === 'barista';

  const u = {
    ...USER0, ...user,
    name: user.name || 'Alex', city: user.city || 'Johannesburg',
    tier: user.tier || 'Coffee Curious', points: user.points || 0,
    logs: user.logs_count || user.logs || 0, cafes: user.cafes_count || user.cafes || 0,
    currentDrinking: user.current_drinking || null,
    profile: { acidity: user.acidity || 7.8, fruitiness: user.fruitiness || 8.5, sweetness: user.sweetness || 6.5, body: user.body || 4.2, intensity: user.intensity || 4.8, aroma: user.aroma || 7.5, finish: user.finish || 7 },
    preferences: { likes: user.likes || USER0.preferences.likes, avoids: user.avoids || USER0.preferences.avoids },
  };

  const processedFeed = feed.map(p => ({ ...p, liked: upvoted.has(p.id), userId: p.user_id || p.userId, upvotes: p.upvotes_count || p.upvotes || 0 }));

  if (success) return (
    <div className="shell"><div className="view">
      <div className="fi" style={{ background: 'var(--ink)', minHeight: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '40px 26px', textAlign: 'center', color: '#fff' }}>
        <div style={{ width: 76, height: 76, borderRadius: '50%', background: 'rgba(109,140,106,.2)', border: '1px solid var(--sge2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 34, marginBottom: 18 }}>☕</div>
        <div className="serif" style={{ fontSize: 24, marginBottom: 6 }}>Logged!</div>
        <div style={{ fontSize: 12, color: 'rgba(255,255,255,.45)', marginBottom: 12 }}>{success.beanName || 'Coffee'} at {success.cafeName || 'café'}</div>
        <div style={{ display: 'flex', gap: 7, justifyContent: 'center', marginBottom: 8, flexWrap: 'wrap' }}>
          <span className="pts">+{success.pts} pts</span>
          {success.review && <span style={{ fontSize: 11, background: 'rgba(109,140,106,.25)', color: 'var(--sge2)', padding: '3px 9px', borderRadius: 999 }}>Published ✓</span>}
        </div>
        <div style={{ fontSize: 11, color: 'rgba(255,255,255,.2)', marginBottom: 22 }}>{USE_SUPABASE ? 'Saved to Supabase' : 'Saved locally'}</div>
        <button onClick={() => { sSuccess(null); sScreen('home'); }} style={{ background: 'var(--gld)', color: '#fff', border: 'none', borderRadius: 10, padding: '13px', fontSize: 14, fontWeight: 500, cursor: 'pointer', width: '100%', fontFamily: 'Inter,sans-serif' }}>Back to Home</button>
      </div>
    </div></div>
  );

  return (
    <div className="shell">
      <div className="view">
        {logging ? <LogCoffee user={u} onBack={() => sLogging(false)} onDone={handleLog} toast={showToast} /> :
          screen === 'home' ? <Home user={u} setUser={setUser} feed={processedFeed} setFeed={setFeed} following={following} onLog={() => sLogging(true)} onGoTo={sScreen} toast={showToast} onUpvote={handleUpvote} /> :
          screen === 'discover' ? <Discover user={u} toast={showToast} /> :
          screen === 'social' ? <Social user={u} following={following} onFollow={handleFollow} toast={showToast} /> :
          screen === 'profile' ? <Profile user={u} setUser={setUser} logs={logs} following={following} onGoTo={sScreen} toast={showToast} onSignOut={handleSignOut} /> :
          screen === 'barista' ? <BaristaPortal inventory={inventory} setInventory={setInventory} onBack={() => sScreen('profile')} toast={showToast} userId={authUser?.id} /> : null}
      </div>
      {!hideNav && (
        <nav className="nav">
          {NAV.map(({ id, lbl, ic: Ic }) => (
            <button key={id} className={`nb${screen === id ? ' on' : ''}`} onClick={() => id === 'log' ? sLogging(true) : sScreen(id)}>
              <Ic />{lbl}<div className="pip" />
            </button>
          ))}
        </nav>
      )}
      {toast && <Toast msg={toast} onDone={() => sToast('')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
