// ═════════════════ UTILS ═══════════════════════════════════════
function Toast({msg,onDone}){useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t)},[]);return <div className="toast">{msg}</div>;}

function MR({pct,size=46}){const d=(pct/100)*360;return <div className="mr" style={{width:size,height:size,background:`conic-gradient(var(--sge) ${d}deg,rgba(30,15,7,.1) ${d}deg)`}}><div className="mr-in" style={{width:size-14,height:size-14,fontSize:10}}>{pct}%</div></div>;}

function Stars({val,onChange,size=26}){
  const[h,sh]=useState(0);
  return <div style={{display:'flex',gap:4}}>
    {[1,2,3,4,5].map(n=><span key={n} className={`star${n<=(h||val)?' lit':''}`} style={{fontSize:size}} onClick={()=>onChange&&onChange(n)} onMouseEnter={()=>onChange&&sh(n)} onMouseLeave={()=>sh(0)}>★</span>)}
  </div>;
}

function matchScore(up,bean){
  const w={acidity:.25,fruitiness:.2,sweetness:.2,body:.15,intensity:.1,aroma:.05,finish:.05};
  let t=0,wt=0;
  Object.entries(w).forEach(([k,v])=>{const u=up[k],b=bean[k];if(u!=null&&b!=null){t+=v*(1-Math.abs(u-b)/10);wt+=v;}});
  return wt>0?Math.round((t/wt)*100):70;
}

function RadarChart({data,size=155}){
  const cx=size/2,cy=size/2,r=size*.37;
  const axes=['Acidity','Fruitiness','Sweetness','Body','Aroma','Finish'];
  const vals=axes.map(a=>data[a.toLowerCase()]||0);
  const pt=(f,i)=>{const a=(i/axes.length)*2*Math.PI-Math.PI/2;return[cx+Math.cos(a)*f,cy+Math.sin(a)*f];};
  const poly=v=>axes.map((_,i)=>pt((v[i]/10)*r,i).join(',')).join(' ');
  return <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
    {[.25,.5,.75,1].map((f,i)=><polygon key={i} points={axes.map((_,j)=>pt(f*r,j).join(',')).join(' ')} fill="none" stroke="rgba(30,15,7,.07)" strokeWidth=".8"/>)}
    {axes.map((_,i)=>{const[x,y]=pt(r,i);return <line key={i} x1={cx} y1={cy} x2={x.toFixed(1)} y2={y.toFixed(1)} stroke="rgba(30,15,7,.07)" strokeWidth=".8"/>;}).flat()}
    <polygon points={poly(vals)} fill="rgba(109,140,106,.15)" stroke="var(--sge)" strokeWidth="2"/>
    {vals.map((v,i)=>{const[x,y]=pt((v/10)*r,i);return <circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="4" fill="var(--sge)"/>;}).flat()}
    {axes.map((l,i)=>{const[x,y]=pt(r+17,i);return <text key={i} x={x.toFixed(1)} y={y.toFixed(1)} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill="var(--ink3)" fontFamily="Inter,sans-serif">{l}</text>;}).flat()}
  </svg>;
}

// ═════════ LIVE MAP ═══════════════════════════════════════════
function LiveMap({height=260}){
  const ref=useRef(null);const inst=useRef(null);const nom=useRef([]);
  const[status,ss]=useState('Tap 📍 to find cafés near you via GPS');
  const[locating,sL]=useState(false);const[located,sLd]=useState(false);
  useEffect(()=>{
    if(inst.current||!window.L||!ref.current)return;
    const L=window.L;
    const map=L.map(ref.current,{zoomControl:false,scrollWheelZoom:true,tap:false}).setView([-26.2041,28.0473],12);
    inst.current=map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    ALL_CAFES.forEach(c=>{
      const hasHot=c.hotBeans.length>0;
      const ico=L.divIcon({html:`<div style="background:${c.color};border-radius:12px;padding:5px 9px;color:#fff;font-size:10px;font-weight:600;font-family:Inter,sans-serif;white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.35);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;gap:4px">${c.emoji} ${c.name.split(',')[0]}${hasHot?'<span style="background:linear-gradient(135deg,#FF4500,#FF8C00);border-radius:999px;padding:1px 5px;font-size:8px">🔥</span>':''}</div>`,className:'',iconAnchor:[0,36]});
      const m=L.marker([c.lat,c.lng],{icon:ico}).addTo(map);
      const bl=c.hotBeans.slice(0,2).map(b=>`<div style="font-size:11px;color:#333;padding:2px 0;border-bottom:1px solid #f5f5f5">${b}</div>`).join('');
      m.bindPopup(`<div style="font-family:Inter,sans-serif;min-width:210px;padding:0"><div style="background:${c.color};padding:10px 13px;border-radius:14px 14px 0 0"><div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:2px">${c.emoji} ${c.roasteryName}</div><div style="font-size:10px;color:rgba(255,255,255,.55)">${c.name}</div></div><div style="padding:10px 13px">${c.hotBeans.length?`<div style="font-size:9px;font-weight:700;color:#7A5010;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">🔥 Hot now</div>${bl}`:''}<div style="margin-top:9px"><button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.addr)}','_blank')" style="width:100%;padding:8px;border-radius:8px;background:#1E0F07;color:#fff;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">📍 Directions</button></div></div></div>`,{maxWidth:280,closeButton:false,offset:[0,-36]});
    });
    setTimeout(()=>map.invalidateSize(),100);
  },[]);
  const locate=()=>{
    if(!navigator.geolocation){ss('Geolocation not available');return;}
    sL(true);ss('Finding your location…');
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      const L=window.L,map=inst.current;
      if(!map||!L)return;
      sL(false);sLd(true);
      const ui=L.divIcon({html:`<div style="width:18px;height:18px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 2px 8px rgba(66,133,244,.6)"></div>`,className:'',iconAnchor:[9,9]});
      L.marker([lat,lng],{icon:ui,zIndexOffset:1000}).addTo(map).bindPopup('<div style="font-family:Inter,sans-serif;font-size:12px;font-weight:600;padding:6px 10px">📍 You are here</div>').openPopup();
      map.setView([lat,lng],14,{animate:true});
      ss('📍 Located · Fetching real coffee shops from OpenStreetMap…');
      fetch(`https://nominatim.openstreetmap.org/search?q=coffee+shop&format=json&limit=25&bounded=1&viewbox=${lng-.06},${lat+.06},${lng+.06},${lat-.06}&addressdetails=1`,{headers:{'User-Agent':'Brewly-App/1.0'}})
        .then(r=>r.json()).then(data=>{
          nom.current.forEach(m=>map.removeLayer(m));nom.current=[];
          const valid=data.filter(p=>p.lat&&p.lon);
          valid.forEach(place=>{
            const nm=L.divIcon({html:`<div style="background:#fff;border:2px solid #C8974A;border-radius:999px;padding:4px 9px;font-size:10px;font-weight:600;font-family:Inter,sans-serif;color:#1E0F07;box-shadow:0 2px 8px rgba(0,0,0,.18);white-space:nowrap">☕ ${place.display_name.split(',')[0]}</div>`,className:'',iconAnchor:[0,24]});
            const mk=L.marker([+place.lat,+place.lon],{icon:nm}).addTo(map);
            mk.bindPopup(`<div style="font-family:Inter,sans-serif;padding:10px 13px;min-width:190px"><div style="font-size:12px;font-weight:600;color:#1E0F07;margin-bottom:4px">☕ ${place.display_name.split(',')[0]}</div><div style="font-size:10px;color:#6B4030;margin-bottom:8px">${place.display_name.split(',').slice(1,3).join(',').trim()}</div><span style="background:#E2F0DF;color:#6D8C6A;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px">OSM verified</span><div style="margin-top:8px"><button onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(place.display_name)}','_blank')" style="width:100%;padding:8px;border-radius:8px;background:#1E0F07;color:#fff;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">📍 Directions</button></div></div>`,{maxWidth:260,closeButton:false});
            nom.current.push(mk);
          });
          ss(`📍 ${valid.length} real coffee shops found + ${ALL_CAFES.length} Brewly partner cafés`);
        }).catch(()=>ss(`📍 Located · ${ALL_CAFES.length} Brewly partner cafés shown`));
    },err=>{sL(false);const m={1:'Location denied',2:'Could not get location',3:'Timed out'};ss(m[err.code]||'Location error');},{timeout:12000,enableHighAccuracy:true});
  };
  return <div style={{position:'relative'}}>
    <div ref={ref} style={{height,width:'100%',borderRadius:14,overflow:'hidden'}}/>
    <button onClick={locate} disabled={locating} style={{position:'absolute',top:10,right:10,zIndex:999,background:located?'var(--sge)':locating?'rgba(250,248,243,.9)':'rgba(250,248,243,.97)',border:`.5px solid ${located?'var(--sge)':locating?'var(--gld)':'var(--b2)'}`,borderRadius:10,padding:'7px 12px',fontSize:12,fontWeight:600,fontFamily:'Inter,sans-serif',cursor:'pointer',color:located?'#fff':'var(--ink)',boxShadow:'var(--sh2)'}}>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
          {METHODS.map(m=><button key={m} onClick={()=>sMethod(m)} style={{padding:'8px 3px',borderRadius:8,border:`.5px solid ${method===m?'var(--ink)':'var(--b2)'}`,background:method===m?'var(--ink)':'var(--cr2)',color:method===m?'#fff':'var(--ink)',fontFamily:'Inter,sans-serif',fontSize:10,fontWeight:500,cursor:'pointer'}}>{m}</button>)}
        </div>

  const cd=user.currentDrinking;
  return <div className="cd-bar" style={{display:'flex',alignItems:'center',gap:12}}>
    <div style={{flex:1,minWidth:0}}>

      <div className="serif" style={{fontSize:16,color:'#fff',lineHeight:1.2,marginBottom:2}}>{cd.bean}</div>

// ═════════ FEED ITEM ══════════════════════════════════════════
function FeedItem({item,author,onUpvote,toast,onLightbox}){
  const[voted,setVoted]=useState(item.votedOption);

  return <div className="feed-item">
    <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
      <div className="av" style={{background:author.isBarista?'#2A1810':'var(--cr3)',color:author.isBarista?'#fff':'var(--ink)',fontFamily:'Cormorant Garamond,serif'}}>
        {author.avatar}
        {author.currentDrinking&&<div style={{position:'absolute',bottom:0,right:0,width:9,height:9,borderRadius:'50%',background:'var(--gld)',border:'2px solid #fff',animation:'pulse 1.5s infinite'}}/>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,flexWrap:'wrap'}}>
          <span style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>{author.name}</span>
          {author.currentDrinking&&<span style={{fontSize:9,color:'var(--gld)',fontWeight:700,display:'flex',alignItems:'center',gap:3}}><span className="cd-dot" style={{width:5,height:5}}/>live</span>}
          <span style={{fontSize:10,color:'var(--ink3)'}}>{item.time}</span>
          <span style={{marginLeft:'auto',fontSize:10,color:typeColor[item.type]||'var(--ink3)',fontWeight:600}}>{typeLabel[item.type]}</span>
        </div>
        {item.bean&&<div style={{fontSize:11,color:'var(--ink3)',marginBottom:4}}><span style={{fontWeight:600,color:'var(--ink)'}}>{item.bean}</span>{item.cafe&&<> · {item.cafe}</>}{item.method&&<> · {item.method}</>}</div>}
        {item.rating&&<div style={{fontSize:11,color:'var(--gld)',marginBottom:4}}>{'★'.repeat(item.rating)}</div>}
        <div style={{fontSize:13,color:'var(--ink)',lineHeight:1.55,marginBottom:6}}>{item.text}</div>
        {/* Single photo */}
        {item.photos&&item.photos.length===1&&<img src={item.photos[0]} style={{width:'100%',borderRadius:11,objectFit:'cover',maxHeight:200,display:'block',marginBottom:6,cursor:'pointer'}} alt="" onClick={()=>onLightbox&&onLightbox(item.photos[0])} onError={e=>{e.target.style.display='none'}}/>}
        {/* Two photos */}
        {item.photos&&item.photos.length===2&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,marginBottom:6}}>
          {item.photos.map((p,i)=><img key={i} src={p} style={{width:'100%',borderRadius:9,objectFit:'cover',height:110,cursor:'pointer'}} alt="" onClick={()=>onLightbox&&onLightbox(p)} onError={e=>{e.target.style.display='none'}}/>)}
        </div>}
        {/* Three+ photos */}
        {item.photos&&item.photos.length>=3&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,marginBottom:6}}>
          <img src={item.photos[0]} style={{width:'100%',borderRadius:9,objectFit:'cover',height:220,gridRow:'1/3',cursor:'pointer'}} alt="" onClick={()=>onLightbox&&onLightbox(item.photos[0])} onError={e=>{e.target.style.display='none'}}/>
          <img src={item.photos[1]} style={{width:'100%',borderRadius:9,objectFit:'cover',height:107,cursor:'pointer'}} alt="" onClick={()=>onLightbox&&onLightbox(item.photos[1])} onError={e=>{e.target.style.display='none'}}/>
          <img src={item.photos[2]} style={{width:'100%',borderRadius:9,objectFit:'cover',height:107,cursor:'pointer'}} alt="" onClick={()=>onLightbox&&onLightbox(item.photos[2])} onError={e=>{e.target.style.display='none'}}/>
        </div>}
        {/* Video */}
        {item.type==='video'&&item.thumbnail&&<div style={{position:'relative',cursor:'pointer',marginBottom:6}} onClick={()=>toast('Video playback coming soon!')}>
          <img src={item.thumbnail} alt="" style={{width:'100%',borderRadius:11,objectFit:'cover',maxHeight:200,display:'block'}} onError={e=>{e.target.style.display='none'}}/>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.25)',borderRadius:11}}>
            <div style={{width:44,height:44,borderRadius:'50%',background:'rgba(255,255,255,.9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>▶</div>
          </div>
        </div>}
        {/* Poll */}
        {item.type==='poll'&&item.pollOptions&&<div style={{marginTop:4,marginBottom:6}}>
          {item.pollOptions.map((opt,i)=>{
            const total=item.pollOptions.reduce((s,o)=>s+o.votes,0);
            const pct=Math.round((opt.votes/total)*100);
            const isV=voted===i;
            return <div key={i} className="poll-opt" onClick={()=>{if(voted==null){setVoted(i);toast('Vote recorded! 📊');}}}>
              <div style={{position:'absolute',top:0,left:0,bottom:0,width:voted!=null?`${pct}%`:0,background:'rgba(200,151,74,.12)',transition:'width .4s ease'}}/>
              <div style={{position:'relative',display:'flex',justifyContent:'space-between'}}>
                <span style={{fontSize:13,fontWeight:isV?600:400,color:'var(--ink)'}}>{isV?'✓ ':''}{opt.text}</span>
                {voted!=null&&<span style={{fontSize:12,fontWeight:600,color:'var(--gld)'}}>{pct}%</span>}
              </div>
            </div>;
          })}
          {voted==null&&<div style={{fontSize:11,color:'var(--ink3)',textAlign:'center',marginTop:4}}>Tap to vote · {item.pollOptions.reduce((s,o)=>s+o.votes,0)} votes</div>}
        </div>}
        {item.flavors&&<div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:6}}>
          {item.flavors.map(f=><span key={f} className="chip sge" style={{fontSize:10,padding:'2px 7px',margin:0}}>{f}</span>)}
        </div>}
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:5}}>
          <button onClick={onUpvote} className={`upvote-btn${item.liked?' on':''}`}>▲ {item.upvotes+(item.liked?1:0)}</button>
          <button onClick={()=>toast('Comment coming soon!')} style={{fontSize:11,cursor:'pointer',color:'var(--ink3)',background:'none',border:'none',fontFamily:'Inter,sans-serif'}}>💬 Reply</button>
          <button onClick={()=>toast('Shared!')} style={{fontSize:11,cursor:'pointer',color:'var(--ink3)',background:'none',border:'none',fontFamily:'Inter,sans-serif'}}>↗ Share</button>
          <span className="pts" style={{fontSize:9,padding:'2px 7px',marginLeft:'auto'}}>+{item.pts} pts</span>
        </div>
      </div>
    </div>
  </div>;
}

  const[baristaInfo,sBI]=useState({name:'',specialties:'',yrs:'',bio:''});

  const mockProfile={name:'Alex (scanned)',prefers:['Bright acidity','Fruity'],avoids:['Heavy bitterness'],tier:'Flavour Explorer',points:340,
    profile:{acidity:7.8,fruitiness:8.5,body:4.2,sweetness:6.5,intensity:4.8},
    history:[{bean:'Lalesa Black Honey',liked:true,method:'V60'},{bean:'Kenya Single Origin',liked:false,method:'Espresso',note:'Too bright as espresso for me'}]};
  const rankBeans=p=>[...inventory].sort((a,b)=>{
    const da=Math.abs((a.acidity||5)-p.profile.acidity)+Math.abs((a.fruitiness||5)-p.profile.fruitiness);
    const db=Math.abs((b.acidity||5)-p.profile.acidity)+Math.abs((b.fruitiness||5)-p.profile.fruitiness);
    return da-db;
  });
  const bMP=(bean,p)=>Math.max(0,Math.round(100-((Math.abs((bean.acidity||5)-p.profile.acidity)+Math.abs((bean.fruitiness||5)-p.profile.fruitiness))/20*100)));
  const addBean=()=>{
    if(!newBean.name)return;
    const db=ALL_BEANS.find(b=>b.name.toLowerCase().includes(newBean.name.toLowerCase().split(' ')[0]));
    const toAdd={id:'inv'+Date.now(),name:db?.name||newBean.name,roastery:db?.roasteryName||newBean.roastery||'Unknown',origin:db?.origin||'',process:db?.process||newBean.process,roast:db?.roast||newBean.roast,flavors:db?.flavors||(newBean.tasting?newBean.tasting.split(',').map(t=>t.trim()):[]),stock:newBean.stock,acidity:db?.acidity||5,fruitiness:db?.fruitiness||5,body:db?.body||5,sweetness:db?.sweetness||5,intensity:db?.intensity||5,autoLoaded:!!db};
    setInventory(inv=>[...inv,toAdd]);
    sNB({name:'',roastery:'',process:'Washed',roast:'Light',tasting:'',stock:'High'});
    sAdd(false);
    toast(db?`${toAdd.name} added — flavour profile auto-loaded from database ✓`:'Bean added to inventory ✓');
  };

              <div style={{width:6,height:6,borderRadius:'50%',background:h.liked?'var(--sge)':'var(--rst)',flexShrink:0}}/>
              <span style={{color:'var(--ink)',fontWeight:500}}>{h.bean}</span><span style={{color:'var(--ink3)'}}>· {h.method}</span>
              {h.note&&<span style={{color:h.liked?'var(--sge)':'var(--rst)',fontStyle:'italic'}}>· "{h.note}"</span>}
            </div>)}
          </div>
        </div>
        <div className="lbl" style={{marginBottom:8}}>Recommended from your stock</div>
        {inventory.length===0&&<div style={{background:'var(--rst3)',borderRadius:11,padding:'11px 13px',borderLeft:'2px solid var(--rst2)',fontSize:12,color:'var(--ink)'}}>No beans in inventory yet. Add beans in the "In Stock" tab to start matching customers.</div>}
        {rankBeans(scanned).slice(0,4).map((bean,i)=>(
          <div key={bean.id} style={{background:'#fff',borderRadius:13,border:`.5px solid ${i===0?'var(--sge)':'var(--b)'}`,padding:'12px 14px',marginBottom:9,display:'flex',alignItems:'center',gap:11}}>
            <div style={{flex:1}}>
              {i===0&&<div style={{fontSize:9,color:'var(--sge)',fontWeight:700,letterSpacing:.8,textTransform:'uppercase',marginBottom:3}}>⭐ Top pick for this customer</div>}

              <div style={{fontSize:10,color:'var(--ink3)',marginBottom:5}}>{bean.roastery} · {bean.origin} · {bean.roast}</div>
              <div>{(bean.flavors||[]).slice(0,3).map(f=><span key={f} className="chip sge" style={{fontSize:10,padding:'2px 6px',margin:'0 3px 0 0'}}>{f}</span>)}</div>
              {bean.stock==='Low'&&<span style={{fontSize:9,background:'var(--rst3)',color:'var(--rst)',padding:'2px 7px',borderRadius:999,marginTop:4,display:'inline-block'}}>Low stock</span>}
            </div>
            <MR pct={bMP(bean,scanned)} size={44}/>
          </div>
        ))}
        <button className="btn btn-out" style={{marginTop:8}} onClick={()=>{setScan(null);toast('Customer profile cleared');}}>Clear scan</button>
      </div>}
    </div>:tab==='inventory'?<div className="p16">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div className="lbl">Beans in stock ({inventory.length})</div>

      </div>
      {addOpen&&<div style={{background:'var(--cr2)',borderRadius:13,padding:14,marginBottom:14,border:'.5px solid var(--b)'}}>

        <div style={{background:'var(--sge3)',borderRadius:9,padding:'8px 11px',marginBottom:11,fontSize:11,color:'var(--sge)',lineHeight:1.5,borderLeft:'2px solid var(--sge)'}}>✦ Type a known bean name and the full flavour profile, acidity, and fruitiness auto-loads from our 9-roastery database.</div>

        </div>
        <div style={{marginBottom:9}}><label className="lbl" style={{display:'block',marginBottom:4}}>Roastery (if not in DB)</label><input className="inp" placeholder="e.g. Father Coffee" value={newBean.roastery} onChange={e=>sNB(b=>({...b,roastery:e.target.value}))} style={{fontSize:13}}/></div>
        <div style={{display:'flex',gap:7,marginBottom:9}}>
          <div style={{flex:1}}><label className="lbl" style={{display:'block',marginBottom:4}}>Process</label>
            <select className="inp" style={{appearance:'none',cursor:'pointer'}} value={newBean.process} onChange={e=>sNB(b=>({...b,process:e.target.value}))}>
              {['Washed','Natural','Honey','Anaerobic','Vacuum Fermented','Mixed'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div style={{flex:1}}><label className="lbl" style={{display:'block',marginBottom:4}}>Roast</label>
            <select className="inp" style={{appearance:'none',cursor:'pointer'}} value={newBean.roast} onChange={e=>sNB(b=>({...b,roast:e.target.value}))}>
              {['Light','Light-Medium','Medium','Medium-Dark','Dark'].map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:9}}><label className="lbl" style={{display:'block',marginBottom:4}}>Tasting notes (comma separated)</label><input className="inp" placeholder="e.g. Guava, Jasmine, Dark chocolate" value={newBean.tasting} onChange={e=>sNB(b=>({...b,tasting:e.target.value}))} style={{fontSize:13}}/></div>
        <div style={{marginBottom:11}}><label className="lbl" style={{display:'block',marginBottom:4}}>Stock level</label>
          <div style={{display:'flex',gap:6}}>{['High','Medium','Low','Out'].map(s=><button key={s} onClick={()=>sNB(b=>({...b,stock:s}))} style={{flex:1,padding:'8px 4px',borderRadius:8,border:`.5px solid ${newBean.stock===s?'var(--ink)':'var(--b2)'}`,background:newBean.stock===s?'var(--ink)':'var(--cr2)',color:newBean.stock===s?'#fff':'var(--ink)',fontFamily:'Inter,sans-serif',fontSize:11,cursor:'pointer'}}>{s}</button>)}</div>
        </div>
        <div style={{display:'flex',gap:7}}><button className="btn btn-dk" style={{flex:2}} onClick={addBean}>Save Bean</button><button className="btn btn-out" style={{flex:1}} onClick={()=>sAdd(false)}>Cancel</button></div>
      </div>}
      {inventory.length===0&&!addOpen&&<div style={{textAlign:'center',padding:'28px 0'}}><div style={{fontSize:38,marginBottom:8}}>🫘</div><div className="serif" style={{fontSize:16,color:'var(--ink)',marginBottom:5}}>No beans in stock</div><div style={{fontSize:12,color:'var(--ink3)'}}>Add your first bean above to start matching customers.</div></div>}
      {inventory.map(b=>(
        <div key={b.id} style={{display:'flex',alignItems:'flex-start',gap:11,padding:'11px 0',borderBottom:'.5px solid var(--b)'}}>
          <div className="sdot" style={{background:b.stock==='High'?'var(--sge)':b.stock==='Medium'?'var(--gld)':b.stock==='Low'?'var(--rst2)':'#ccc',marginTop:5}}/>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
              <span className="serif" style={{fontSize:14,color:'var(--ink)'}}>{b.name}</span>
              {b.autoLoaded&&<span style={{fontSize:9,color:'var(--sge)',fontWeight:600}}>✦ auto-loaded</span>}
            </div>
            <div style={{fontSize:10,color:'var(--ink3)',marginBottom:4}}>{b.roastery} · {b.origin} · {b.process} · {b.roast}</div>
            {b.flavors?.length>0&&<div>{b.flavors.slice(0,4).map(f=><span key={f} className="chip sge" style={{fontSize:10,padding:'2px 6px',margin:'0 3px 3px 0'}}>{f}</span>)}</div>}
          </div>
          <select value={b.stock} onChange={e=>{setInventory(inv=>inv.map(x=>x.id===b.id?{...x,stock:e.target.value}:x));toast('Stock updated ✓');}} style={{fontSize:11,border:'.5px solid var(--b2)',borderRadius:7,padding:'4px 7px',background:'var(--cr2)',color:'var(--ink)',appearance:'none',cursor:'pointer',fontFamily:'Inter,sans-serif',flexShrink:0}}>

          </select>
        </div>
      ))}
    </div>:tab==='customers'?<div className="p16">
      <div className="lbl" style={{marginBottom:12}}>Saved customer profiles</div>
      {[{name:'Regular — Prefers filter',tier:'Palate Pro',pts:2340,prefers:['Bright acidity','Fruity','Ethiopian'],avoids:['Heavy bitterness'],lastVisit:'Today',notes:'Always orders V60, loves washed Ethiopian — prefers no milk'},
        {name:'Walk-in customer',tier:'Brew Guide',pts:780,prefers:['Natural process','Full body'],avoids:['Very high acidity'],lastVisit:'Yesterday',notes:'Enjoys naturals as espresso or milk drinks'}
      ].map((c,i)=>(
        <div key={i} style={{background:'#fff',borderRadius:13,border:'.5px solid var(--b)',padding:'13px 14px',marginBottom:11}}>

            <div style={{fontSize:13,fontWeight:500,color:'var(--ink)',marginBottom:2}}>{c.name}</div>
            <div style={{fontSize:10,color:'var(--ink3)',marginBottom:7}}>{c.tier} · {c.pts} pts · Last visit: {c.lastVisit}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:7}}>
              {c.prefers.map(p=><span key={p} className="chip sge" style={{fontSize:11,margin:0,marginRight:4,marginBottom:3}}>✓ {p}</span>)}
              {c.avoids.map(a=><span key={a} className="chip rst" style={{fontSize:11,margin:0,marginRight:4,marginBottom:3}}>✗ {a}</span>)}
            </div>
            {c.notes&&<div style={{fontSize:11,color:'var(--ink3)',fontStyle:'italic',marginBottom:9}}>{c.notes}</div>}
          </div>
          <button style={{padding:'8px 13px',borderRadius:9,background:'var(--ink)',color:'#fff',border:'none',fontFamily:'Inter,sans-serif',fontSize:12,cursor:'pointer'}} onClick={()=>{const ranked=rankBeans({profile:{acidity:c.tier==='Palate Pro'?8.5:6,fruitiness:c.tier==='Palate Pro'?9:6.5}});toast(`Recommend: ${ranked[0]?.name||'Add beans to inventory first'}`);}}>☕ Recommend bean for this customer</button>
        </div>
      ))}
    </div>:tab==='purchase'?<div className="p16">
      <div style={{background:'var(--sge3)',borderRadius:11,padding:'11px 13px',borderLeft:'2px solid var(--sge)',marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,color:'var(--sge)',marginBottom:4}}>Based on your customer taste data</div>
        <div style={{fontSize:12,color:'var(--ink)',lineHeight:1.55}}>38% of your QR scans have full-body, low-acid preferences you can\'t currently satisfy. The Burundi or DRC singles from Bean There would close this gap immediately.</div>
      </div>
      <div className="lbl" style={{marginBottom:8}}>Recommended to stock next</div>
      {ALL_BEANS.filter(b=>b.body>6||b.acidity<5).slice(0,3).map(b=>{
        const r=ROASTERIES.find(x=>x.id===b.roasteryId);
        return <div key={b.id} style={{background:'#fff',borderRadius:12,border:'.5px solid var(--b)',padding:'12px 13px',marginBottom:9}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <div><div className="serif" style={{fontSize:14,color:'var(--ink)',marginBottom:2}}>{b.name}</div><div style={{fontSize:10,color:'var(--ink3)'}}>{r?.name} · {b.origin}</div></div>
            <span className="pts">{b.price}</span>
          </div>
          <div style={{marginBottom:8}}>{b.flavors.map(f=><span key={f} className="chip gld" style={{fontSize:10,padding:'2px 7px',margin:'2px 3px'}}>{f}</span>)}</div>
          <div style={{display:'flex',gap:7}}>
            <button style={{flex:1,padding:'9px',borderRadius:9,background:'var(--ink)',color:'#fff',border:'none',fontFamily:'Inter,sans-serif',fontSize:12,cursor:'pointer'}} onClick={()=>toast(`Opening ${r?.name} to order…`)}>Order from {r?.name?.split(' ')[0]}</button>
            <button style={{flex:1,padding:'9px',borderRadius:9,background:'var(--cr2)',color:'var(--ink)',border:'.5px solid var(--b)',fontFamily:'Inter,sans-serif',fontSize:12,cursor:'pointer'}} onClick={()=>toast('Added to wishlist ✓')}>+ Wishlist</button>
          </div>
        </div>;
      })}
      {inventory.filter(b=>b.stock==='Low'||b.stock==='Out').length>0&&<>
        <div className="lbl" style={{margin:'12px 0 8px'}}>Low stock alerts</div>
        <div className="card" style={{padding:'0 13px'}}>
          {inventory.filter(b=>b.stock==='Low'||b.stock==='Out').map((b,i,a)=>(
            <div key={b.id} style={{display:'flex',alignItems:'center',gap:9,padding:'10px 0',borderBottom:i<a.length-1?'.5px solid var(--b)':'none'}}>
              <div className="sdot" style={{background:b.stock==='Out'?'var(--rst)':'var(--gld)'}}/>
              <div style={{flex:1,fontSize:12,color:'var(--ink)',fontWeight:500}}>{b.name}</div>
              <span style={{fontSize:10,padding:'2px 8px',borderRadius:999,background:b.stock==='Out'?'var(--rst3)':'var(--gld3)',color:b.stock==='Out'?'var(--rst)':'#7A5010'}}>{b.stock}</span>
              <button style={{fontSize:11,background:'var(--ink)',color:'#fff',border:'none',borderRadius:7,padding:'5px 9px',cursor:'pointer',fontFamily:'Inter,sans-serif'}} onClick={()=>toast(`Reordering ${b.name}…`)}>Reorder</button>
            </div>
          ))}
        </div>
      </>}
    </div>:tab==='cafe'?<div className="p16">
      {[['Café name',cafeInfo.name,v=>sCI(c=>({...c,name:v})),'text'],['Address',cafeInfo.addr,v=>sCI(c=>({...c,addr:v})),'text'],['Opening hours',cafeInfo.hours,v=>sCI(c=>({...c,hours:v})),'text'],['Specialties',cafeInfo.specialties,v=>sCI(c=>({...c,specialties:v})),'text'],['Website',cafeInfo.website,v=>sCI(c=>({...c,website:v})),'url']].map(([l,val,fn,type])=>(
        <div key={l} style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:4}}>{l}</label><input className="inp" type={type} value={val} onChange={e=>fn(e.target.value)} placeholder={`Enter ${l.toLowerCase()}`} style={{fontSize:13}}/></div>
      ))}
      <div style={{background:'var(--sge3)',borderRadius:11,padding:'11px 13px',borderLeft:'2px solid var(--sge)',marginBottom:13}}>
        <div style={{fontSize:11,color:'var(--sge)',fontWeight:600,marginBottom:4}}>✓ Verified café badge</div>
        <div style={{fontSize:12,color:'var(--ink)',lineHeight:1.5}}>Verified cafés display a ✓ badge in the Discover tab and rank higher in customer taste-match results. Verification is free and takes 48 hours.</div>
      </div>
      <button className="btn btn-dk" onClick={()=>toast('Café profile saved ✓')}>Save Changes</button>
    </div>:tab==='profile'?<div className="p16">
      <div className="lbl" style={{marginBottom:8}}>Your barista profile</div>
      <div style={{background:'var(--cr2)',borderRadius:13,padding:14,marginBottom:14,border:'.5px solid var(--b)'}}>
        {[['Your name',baristaInfo.name,v=>sBI(b=>({...b,name:v}))],['Specialties (comma separated)',baristaInfo.specialties,v=>sBI(b=>({...b,specialties:v}))],['Years experience',baristaInfo.yrs,v=>sBI(b=>({...b,yrs:v}))],['Short bio',baristaInfo.bio,v=>sBI(b=>({...b,bio:v}))]].map(([l,val,fn])=>(
          <div key={l} style={{marginBottom:11}}><label className="lbl" style={{display:'block',marginBottom:4}}>{l}</label><input className="inp" value={val} onChange={e=>fn(e.target.value)} placeholder={`Enter ${l.toLowerCase()}`} style={{fontSize:13}}/></div>
        ))}
      </div>
      <div className="lbl" style={{marginBottom:8}}>Photos of your work</div>
      <div className="upload-zone" onClick={()=>photoRef.current?.click()} style={{marginBottom:12}}>
        <div style={{fontSize:26,marginBottom:6}}>📷</div>
        <div style={{fontSize:13,fontWeight:500,color:'var(--ink)',marginBottom:3}}>Add photos of your craft</div>
        <div style={{fontSize:11,color:'var(--ink3)'}}>Latte art, brew setups, favourite cups · Up to 4 photos</div>
        <input ref={photoRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>handlePhotoUpload(e.target.files)}/>
      </div>
      {baristaPhotos.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:12}}>
        {baristaPhotos.map((p,i)=><div key={i} className="ph-prev">
          <img src={p} alt=""/>
          <button className="ph-del" onClick={()=>setBaristaPhotos(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
        </div>)}
      </div>}
      <div style={{background:'var(--gld3)',borderRadius:11,padding:'11px 13px',borderLeft:'2px solid var(--gld)',marginBottom:13}}>
        <div style={{fontSize:11,color:'#7A5010',fontWeight:600,marginBottom:5}}>📊 Your stats on Brewly</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {[['341','Kudos'],['4.9★','Rating'],['6yr','Experience']].map(([v,l])=>(
            <div key={l} style={{textAlign:'center'}}><div className="serif" style={{fontSize:18,color:'var(--ink)'}}>{v}</div><div style={{fontSize:9,color:'var(--ink3)'}}>{l}</div></div>
          ))}
        </div>
      </div>
      <button className="btn btn-dk" onClick={()=>toast('Profile saved ✓')}>Save Profile</button>
    </div>:null}
    <div style={{height:24}}/>
  </div>;
}

// ═════════ PROFILE ════════════════════════════════════════════
function Profile({user,setUser,logs,following,onGoTo,toast}){
  const[showQR,sqr]=useState(false);const[showCD,sCD]=useState(false);
  const TIERS=['Coffee Curious','Flavour Explorer','Brew Guide','Palate Pro','Craft Authority'];
  const TIER_PTS=[0,100,500,2000,5000];
  const ti=TIERS.indexOf(user.tier);
  const pct=Math.min(100,Math.round((user.points/(TIER_PTS[ti+1]||5000))*100));
  return <div className="fi">
    <div style={{background:'var(--ink)',padding:'22px 18px 28px',color:'#fff'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
        <div style={{width:50,height:50,borderRadius:'50%',background:'rgba(200,151,74,.15)',border:'2px solid rgba(200,151,74,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>☕</div>
        <button onClick={()=>onGoTo('barista')} style={{background:'rgba(255,255,255,.08)',border:'.5px solid rgba(255,255,255,.15)',borderRadius:9,padding:'7px 12px',color:'#fff',fontFamily:'Inter,sans-serif',fontSize:11,fontWeight:600,cursor:'pointer'}}>Barista Portal →</button>
      </div>
      <div className="serif" style={{fontSize:21,color:'#fff',marginBottom:4}}>{user.name}'s Profile</div>
      <div style={{display:'inline-flex',alignItems:'center',gap:5,background:'rgba(109,140,106,.2)',border:'.5px solid var(--sge2)',color:'var(--sge2)',fontSize:10,letterSpacing:.8,textTransform:'uppercase',padding:'3px 10px',borderRadius:999,marginBottom:11,fontWeight:600}}>✦ {user.tier}</div>
      <div style={{display:'flex',marginBottom:12}}>
        {[[user.logs,'logs'],[following.length,'following'],[user.points,'pts']].map(([n,l])=>(
          <div key={l} style={{flex:1,textAlign:'center',borderRight:'.5px solid rgba(255,255,255,.1)',padding:'5px 4px',cursor:l==='following'?'pointer':'default'}} onClick={()=>l==='following'&&onGoTo('social')}>
            <div className="serif" style={{fontSize:19,color:'#fff'}}>{n}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.4)'}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:10,display:'flex',justifyContent:'space-between',color:'rgba(255,255,255,.3)',marginBottom:4}}><span>{user.tier}</span><span>{(TIER_PTS[ti+1]||5000)-user.points} pts to {TIERS[ti+1]||'max'}</span></div>
      <div style={{height:3,background:'rgba(255,255,255,.08)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:'var(--sge2)',borderRadius:2}}/></div>
    </div>
    {/* Currently Drinking on profile */}
    <div style={{margin:'0 16px 13px',marginTop:-14}}>
      <div className="card" style={{padding:'12px 14px',borderLeft:'3px solid var(--gld)',cursor:'pointer'}} onClick={()=>sCD(true)}>
        {user.currentDrinking
          ?<><div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}><span className="cd-dot" style={{width:6,height:6}}/><span style={{fontSize:10,fontWeight:700,color:'var(--gld)',letterSpacing:.8,textTransform:'uppercase'}}>Currently drinking</span></div>
            <div className="serif" style={{fontSize:14,color:'var(--ink)',marginBottom:2}}>{user.currentDrinking.bean}</div>
            <div style={{fontSize:11,color:'var(--ink3)'}}>{user.currentDrinking.cafe} · {user.currentDrinking.method} · {user.currentDrinking.since}</div>
          </>
          :<div style={{display:'flex',alignItems:'center',gap:9}}><div style={{fontSize:18}}>☕</div><div style={{fontSize:12,color:'var(--ink3)'}}>Tap to set <strong style={{color:'var(--ink)'}}>Currently Drinking</strong></div></div>
        }
      </div>
    </div>
    {/* Loyalty Card */}
    <div onClick={()=>sqr(true)} style={{background:'linear-gradient(135deg,#2A1508,#4A2C14)',borderRadius:13,padding:15,color:'#fff',margin:'0 16px 13px',cursor:'pointer',position:'relative',overflow:'hidden',boxShadow:'var(--sh2)'}}>
      <div style={{position:'absolute',top:-20,right:-20,width:90,height:90,borderRadius:'50%',background:'rgba(200,151,74,.1)'}}/>
      <div style={{position:'relative',zIndex:1}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div className="serif" style={{fontSize:16}}>Brew<em style={{fontStyle:'italic',color:'var(--gld2)'}}>ly</em> Card</div>
          <span className="pts">{user.points} pts</span>
        </div>
        <div className="serif" style={{fontSize:13,marginBottom:2}}>{user.name}</div>
        <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:9}}>{user.tier.toUpperCase()} · MEMBER</div>
        <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:3}}>Next free coffee in {Math.max(0,500-user.points)} pts</div>
        <div style={{height:3,background:'rgba(255,255,255,.12)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,(user.points/500)*100)}%`,background:'var(--gld)',borderRadius:2}}/></div>
        <div style={{fontSize:9,color:'rgba(255,255,255,.2)',marginTop:6}}>Tap · QR code · Flavour web · Brew recommendations · Share with barista</div>
      </div>
    </div>
    <div className="px16">
      <div className="lbl" style={{marginBottom:8}}>Flavour radar</div>
      <div className="card" style={{padding:14,marginBottom:13}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <RadarChart data={user.profile} size={150}/>
          <div style={{flex:1}}>
            {[['Acidity',user.profile.acidity,'#6D8C6A'],['Fruitiness',user.profile.fruitiness,'#D4614A'],['Sweetness',user.profile.sweetness,'#C8974A'],['Body',user.profile.body,'#8B6355'],['Aroma',user.profile.aroma,'#9DB89A']].map(([l,v,c])=>(
              <div key={l} style={{marginBottom:7}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--ink3)',marginBottom:2}}><span>{l}</span><span style={{fontWeight:600,color:'var(--ink)'}}>{v.toFixed(1)}</span></div>
                <div style={{height:4,background:'var(--b)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${v*10}%`,background:c,borderRadius:2}}/></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="lbl" style={{marginBottom:8}}>You enjoy</div>
      <div style={{marginBottom:11}}>{user.preferences.likes.map(l=><span key={l} className="chip sge">{l}</span>)}</div>
      <div className="lbl" style={{marginBottom:8}}>You avoid</div>
      <div style={{marginBottom:13}}>{user.preferences.avoids.map(a=><span key={a} className="chip rst">{a}</span>)}</div>
      <div className="lbl" style={{marginBottom:8}}>Your top bean matches</div>
      <div className="card" style={{marginBottom:16}}>
        {ALL_BEANS.sort((a,b)=>matchScore(user.profile,b)-matchScore(user.profile,a)).slice(0,4).map((b,i,arr)=>(
          <div key={b.id} style={{padding:'10px 13px',borderBottom:i<arr.length-1?'.5px solid var(--b)':'none',display:'flex',alignItems:'center',gap:9}}>
            <div style={{flex:1,minWidth:0}}>
              <div className="serif" style={{fontSize:13,color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:1}}>{b.name}</div>
              <div style={{fontSize:10,color:'var(--ink3)'}}>{b.roasteryName} · {b.price}</div>
            </div>
            <MR pct={matchScore(user.profile,b)} size={36}/>
          </div>
        ))}
      </div>
      {logs.length>0&&<>
        <div className="lbl" style={{marginBottom:8}}>Recent logs</div>
        <div className="card" style={{marginBottom:16}}>
          {logs.slice(-4).reverse().map((l,i,arr)=>(
            <div key={l.id||i} style={{padding:'10px 13px',borderBottom:i<arr.length-1?'.5px solid var(--b)':'none',display:'flex',alignItems:'center',gap:9}}>
              <div style={{flex:1,minWidth:0}}>
                <div className="serif" style={{fontSize:13,color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.beanName||'Coffee'}</div>
                <div style={{fontSize:10,color:'var(--ink3)'}}>{l.cafeName} · {l.method} · {l.date}</div>
              </div>
              {l.rating>0&&<span style={{fontSize:10,color:'var(--gld)',flexShrink:0}}>{'★'.repeat(l.rating)}</span>}
            </div>
          ))}
        </div>
      </>}
    </div>
    {showQR&&<div className="mb" onClick={()=>sqr(false)}><div className="ms" onClick={e=>e.stopPropagation()}>
      <div className="mh"/>
      <div style={{textAlign:'center',marginBottom:14}}>
        <div className="serif" style={{fontSize:19,color:'var(--ink)',marginBottom:3}}>{user.name}'s Taste Card</div>
        <div style={{fontSize:11,color:'var(--ink3)',marginBottom:12}}>Show to your barista for an instant personalised recommendation</div>
        <div style={{display:'inline-block',background:'#fff',borderRadius:11,padding:11,boxShadow:'var(--sh2)',marginBottom:9}}>
          <svg width="95" height="95" viewBox="0 0 95 95"><rect width="95" height="95" fill="white"/>
            {Array.from({length:7},(_,r)=>Array.from({length:7},(_,c)=>(r+c+r*c*3)%7<3?<rect key={`${r}-${c}`} x={c*12+5} y={r*12+5} width="10" height="10" rx="2" fill="#1E0F07"/>:null).flat())}
          </svg>
        </div>
        <div style={{fontSize:10,color:'var(--ink3)',marginBottom:13}}>BRW-{user.name.toUpperCase().replace(' ','-')}-{user.points}</div>
      </div>
      <div style={{display:'flex',gap:9,marginBottom:12}}>
        <div style={{flex:1,background:'var(--sge3)',borderRadius:11,padding:12}}>
          <div className="lbl" style={{color:'var(--sge)',marginBottom:6}}>✓ Prefers</div>
          {user.preferences.likes.slice(0,4).map(l=><div key={l} style={{fontSize:11,color:'var(--ink)',marginBottom:3,fontWeight:500}}>{l}</div>)}
        </div>
        <div style={{flex:1,background:'var(--rst3)',borderRadius:11,padding:12}}>
          <div className="lbl" style={{color:'var(--rst)',marginBottom:6}}>✗ Avoids</div>
          {user.preferences.avoids.map(a=><div key={a} style={{fontSize:11,color:'var(--ink)',marginBottom:3,fontWeight:500}}>{a}</div>)}
          <div className="sep" style={{margin:'6px 0'}}/>
          <div className="lbl" style={{color:'var(--rst)',marginBottom:4}}>Best methods</div>
          {(user.profile.acidity>7?['V60','Filter']:['Espresso','Milk']).map(m=><div key={m} style={{fontSize:11,color:'var(--ink)',marginBottom:3,fontWeight:500}}>{m}</div>)}
        </div>
      </div>
      <div style={{background:'var(--gld3)',borderRadius:11,padding:'10px 12px',marginBottom:12,border:'.5px solid rgba(200,151,74,.35)'}}>
        <div className="lbl" style={{color:'#7A5010',marginBottom:6}}>Top bean matches right now</div>
        {ALL_BEANS.sort((a,b)=>matchScore(user.profile,b)-matchScore(user.profile,a)).slice(0,3).map(b=>(
          <div key={b.id} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4,color:'var(--ink)'}}>
            <span style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{b.name}</span>
            <span style={{color:'var(--gld)',fontWeight:600,flexShrink:0,marginLeft:6}}>{matchScore(user.profile,b)}%</span>
          </div>
        ))}
      </div>
      <button className="btn btn-dk" onClick={()=>{toast('Profile link copied!');sqr(false);}}>Copy Share Link</button>
    </div></div>}
    {showCD&&<div className="mb" onClick={()=>sCD(false)}><div className="ms" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="serif" style={{fontSize:18,color:'var(--ink)',marginBottom:12}}>Set Currently Drinking</div>
      <CDBar user={{currentDrinking:null}} setUser={v=>setUser(v)} toast={m=>{toast(m);sCD(false);}}/>
    </div></div>}
    <div style={{height:20}}/>
  </div>;
}

// ═════════ LOG COFFEE ════════════════════════════════════════
function LogCoffee({user,onBack,onDone,toast}){
  const[f,sf]=useState({beanName:'',cafeName:'',roasteryName:'',method:'',rating:0,liked:null,review:'',kudos:''});
  const set=(k,v)=>sf(x=>({...x,[k]:v}));
  const METHODS=['Espresso','V60','AeroPress','Milk drink','Cold brew','French press','Chemex','Batch brew'];
  return <div className="fi">
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'15px 16px 11px'}}>
      <button className="bbl" onClick={onBack}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div className="serif" style={{fontSize:17,color:'var(--ink)'}}>Log a Coffee</div>
    </div>
    <div className="px16" style={{paddingBottom:20}}>
      <div style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:5}}>☕ Bean</label>
        <div style={{display:'flex',gap:7,overflowX:'auto',scrollbarWidth:'none',marginBottom:7,paddingBottom:2}}>
          {ALL_BEANS.slice(0,6).map(b=><div key={b.id} onMouseDown={()=>{set('beanName',b.name);set('roasteryName',b.roasteryName);}} style={{background:'#fff',border:`.5px solid ${f.beanName===b.name?'var(--sge)':'var(--b)'}`,borderRadius:9,padding:'8px 11px',minWidth:140,flexShrink:0,cursor:'pointer'}}>
            <div style={{fontSize:9,color:'var(--ink3)',marginBottom:2}}>{b.roasteryName}</div>
            <div style={{fontSize:11,fontWeight:500,color:'var(--ink)',lineHeight:1.2,marginBottom:2}}>{b.name}</div>
            <div style={{fontSize:9,color:'var(--sge)',fontWeight:500}}>{b.flavors.slice(0,2).join(', ')}</div>
          </div>)}
        </div>
        <input className="inp" placeholder="Or type bean name…" value={f.beanName} onChange={e=>set('beanName',e.target.value)} style={{fontSize:13}}/>
      </div>
      <div style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:5}}>🏭 Roastery</label>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:6}}>
          {ROASTERIES.slice(0,5).map(r=><button key={r.id} onClick={()=>set('roasteryName',r.name)} style={{padding:'6px 10px',borderRadius:999,border:`.5px solid ${f.roasteryName===r.name?'var(--ink)':'var(--b2)'}`,background:f.roasteryName===r.name?'var(--ink)':'var(--cr2)',color:f.roasteryName===r.name?'#fff':'var(--ink)',fontFamily:'Inter,sans-serif',fontSize:11,cursor:'pointer'}}>{r.emoji} {r.name.split(' ')[0]}</button>)}
        </div>
        <input className="inp" placeholder="Or type roastery name" value={f.roasteryName} onChange={e=>set('roasteryName',e.target.value)} style={{fontSize:13}}/>
      </div>
      <div style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:5}}>🏪 Coffee shop</label>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:6}}>
          {ALL_CAFES.slice(0,5).map(c=><button key={c.name+c.roasteryId} onClick={()=>set('cafeName',c.roasteryName+' '+c.name)} style={{padding:'6px 10px',borderRadius:999,border:`.5px solid ${f.cafeName.includes(c.name)?'var(--ink)':'var(--b2)'}`,background:f.cafeName.includes(c.name)?'var(--ink)':'var(--cr2)',color:f.cafeName.includes(c.name)?'#fff':'var(--ink)',fontFamily:'Inter,sans-serif',fontSize:11,cursor:'pointer'}}>{c.name}</button>)}
        </div>
        <input className="inp" placeholder="Or type café name" value={f.cafeName} onChange={e=>set('cafeName',e.target.value)} style={{fontSize:13}}/>
      </div>
      <div style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:5}}>Brew method</label>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>
          {METHODS.map(m=><button key={m} onClick={()=>set('method',m)} style={{padding:'8px 3px',borderRadius:8,border:`.5px solid ${f.method===m?'var(--ink)':'var(--b2)'}`,background:f.method===m?'var(--ink)':'var(--cr2)',color:f.method===m?'#fff':'var(--ink)',fontFamily:'Inter,sans-serif',fontSize:10,fontWeight:500,cursor:'pointer'}}>{m}</button>)}
        </div>
      </div>
      <div style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:5}}>Rating</label><Stars val={f.rating} onChange={v=>set('rating',v)}/></div>
      <div style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:5}}>Order again?</label>
        <div style={{display:'flex',gap:7}}>{[['Yes ✓',true],['Maybe',null],['No ✗',false]].map(([lb,val])=><button key={lb} onClick={()=>set('liked',val)} style={{flex:1,padding:'9px',borderRadius:8,border:`.5px solid ${f.liked===val?'var(--ink)':'var(--b2)'}`,background:f.liked===val?'var(--ink)':'var(--cr2)',color:f.liked===val?'#fff':'var(--ink)',fontFamily:'Inter,sans-serif',fontSize:12,cursor:'pointer'}}>{lb}</button>)}</div>
      </div>
      <div style={{marginBottom:12}}><label className="lbl" style={{display:'block',marginBottom:5}}>Review — +25 pts (optional)</label>
        <textarea className="ta" placeholder="Share with the community…" value={f.review} onChange={e=>set('review',e.target.value)}/>
      </div>
      <div style={{marginBottom:14}}><label className="lbl" style={{display:'block',marginBottom:5}}>Kudos to barista — +5 pts (optional)</label>
        <input className="inp" placeholder="e.g. James pulled a perfect shot" value={f.kudos} onChange={e=>set('kudos',e.target.value)} style={{fontSize:13}}/>
      </div>
      <button className="btn btn-dk" onClick={()=>{const pts=10+(f.review?25:0)+(f.kudos?5:0);onDone({...f,id:Date.now(),date:new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'short'}),pts});}}>☕ Save to profile</button>
    </div>
  </div>;
}

// ═════════ ROOT APP ══════════════════════════════════════════
function App(){
  const[user,setUser]=useState({...USER0});
  const[feed,setFeed]=useState(INITIAL_FEED);
  const[inventory,setInventory]=useState([
    {id:'inv1',name:'Antimaceration Geisha by El Paraíso',roastery:'Father Coffee',origin:'Colombia',process:'Vacuum Fermented',roast:'Light',flavors:['Guava','Pineapple','Passionfruit','Cola'],stock:'High',acidity:8.5,fruitiness:10,body:8,sweetness:8,intensity:9,autoLoaded:true},
    {id:'inv2',name:'Ethiopia Single Origin',roastery:'Bean There',origin:'Ethiopia',process:'Washed',roast:'Light-Medium',flavors:['Jasmine','Bergamot','Lemon','Peach'],stock:'Medium',acidity:8.5,fruitiness:8.5,body:3.5,sweetness:6.5,intensity:4.5,autoLoaded:true},
    {id:'inv3',name:'Campbell Road House Blend',roastery:'Seam Coffee',origin:'Ethiopia/Colombia',process:'Mixed',roast:'Medium',flavors:['Milk chocolate','Treacle sugar'],stock:'Low',acidity:5.5,fruitiness:5,body:6.5,sweetness:8.5,intensity:6,autoLoaded:true},
  ]);
  const[following,sf]=useState(['u1','u3']);
  const[logs,sl]=useState([{id:1,beanName:'Lalesa Black Honey',cafeName:'Father Kramerville',method:'V60',rating:5,date:'2 Apr'},{id:2,beanName:'Ethiopia Single Origin',cafeName:'Bean There JHB',method:'V60',rating:4,date:'28 Mar'}]);
  const[screen,ss]=useState('home');
  const[logging,sl2]=useState(false);const[success,ssu]=useState(null);const[toast,st]=useState('');
  const showT=m=>st(m);
  const handleFollow=id=>sf(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]);
  const handleLog=log=>{sl(l=>[...l,log]);setUser(u=>({...u,logs:u.logs+1,points:u.points+log.pts}));sl2(false);ssu(log);};
  const NAV=[
    {id:'home',lbl:'Home',ic:()=><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:'discover',lbl:'Discover',ic:()=><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>},
    {id:'log',lbl:'Log',ic:()=><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>},
    {id:'social',lbl:'Social',ic:()=><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>},
    {id:'profile',lbl:'Profile',ic:()=><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},
  ];
  const hideNav=logging||!!success||screen==='barista';
  if(success)return <div className="shell"><div className="view"><div className="fi" style={{background:'var(--ink)',minHeight:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 26px',textAlign:'center',color:'#fff'}}>
    <div style={{width:76,height:76,borderRadius:'50%',background:'rgba(109,140,106,.2)',border:'1px solid var(--sge2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:34,marginBottom:18}}>☕</div>
    <div className="serif" style={{fontSize:24,marginBottom:6}}>Logged!</div>
    <div style={{fontSize:12,color:'rgba(255,255,255,.45)',marginBottom:12}}>{success.beanName} at {success.cafeName}</div>
    <div style={{display:'flex',gap:7,justifyContent:'center',marginBottom:18,flexWrap:'wrap'}}>
      <span className="pts">+{success.pts} pts</span>
      {success.review&&<span style={{fontSize:11,background:'rgba(109,140,106,.25)',color:'var(--sge2)',padding:'3px 9px',borderRadius:999}}>Review published ✓</span>}
      {success.kudos&&<span style={{fontSize:11,background:'rgba(200,151,74,.2)',color:'var(--gld2)',padding:'3px 9px',borderRadius:999}}>Kudos sent ✓</span>}
    </div>
    <button onClick={()=>{ssu(null);ss('home');}} style={{background:'var(--gld)',color:'#fff',border:'none',borderRadius:10,padding:'13px',fontSize:14,fontWeight:500,cursor:'pointer',width:'100%',fontFamily:'Inter,sans-serif'}}>Back to Home</button>
  </div></div></div>;
  return <div className="shell">
    <div className="view">
      {logging?<LogCoffee user={user} onBack={()=>sl2(false)} onDone={handleLog} toast={showT}/>:
       screen==='home'?<Home user={user} setUser={setUser} feed={feed} setFeed={setFeed} following={following} onLog={()=>sl2(true)} onGoTo={ss} toast={showT}/>:
       screen==='discover'?<Discover user={user} toast={showT}/>:
       screen==='social'?<Social user={user} following={following} onFollow={handleFollow} toast={showT}/>:
       screen==='profile'?<Profile user={user} setUser={setUser} logs={logs} following={following} onGoTo={ss} toast={showT}/>:
       screen==='barista'?<BaristaPortal inventory={inventory} setInventory={setInventory} onBack={()=>ss('profile')} toast={showT}/>:null}
    </div>
    {!hideNav&&<nav className="nav">
      {NAV.map(({id,lbl,ic:Ic})=>(
        <button key={id} className={`nb${screen===id?' on':''}`} onClick={()=>id==='log'?sl2(true):ss(id)}>
          <Ic/>{lbl}<div className="pip"/>
        </button>
      ))}
    </nav>}
    {toast&&<Toast msg={toast} onDone={()=>st('')}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
