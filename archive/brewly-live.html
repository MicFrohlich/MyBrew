<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Brewly — Coffee Taste Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF7F2;--cream-dk:#F2EDE3;--esp:#2C1810;--esp-mid:#4A2C1E;
  --brn:#8B6355;--brn-lt:#C4A882;--sage:#7A8C78;--sage-lt:#B2C4B0;--sage-pl:#E8F0E6;
  --wht:#FFFFFF;--bdr:rgba(44,24,16,.10);--bdr-md:rgba(44,24,16,.18);
  --txt-m:#9A8070;--txt-md:#6B4E3D;
  --sh-sm:0 2px 8px rgba(44,24,16,.07);--sh-md:0 4px 20px rgba(44,24,16,.10);--sh-lg:0 8px 40px rgba(44,24,16,.14);
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px
}
html,body{height:100%;background:#1A0F0A;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;align-items:center;justify-content:center}
.shell{width:100%;max-width:430px;height:100vh;max-height:900px;background:var(--cream);position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 80px rgba(0,0,0,.5)}
@media(max-width:430px){.shell{max-height:100vh}}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.scr::-webkit-scrollbar{display:none}
.bnav{display:flex;background:var(--wht);border-top:.5px solid var(--bdr);padding:8px 0 max(env(safe-area-inset-bottom),8px);flex-shrink:0;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--txt-m);transition:color .2s;letter-spacing:.3px}
.nb.on{color:var(--esp)}.nb svg{width:22px;height:22px}
.nd{width:4px;height:4px;border-radius:2px;background:var(--brn);opacity:0;transition:opacity .2s}.nb.on .nd{opacity:1}
.pf{font-family:'Playfair Display',serif}.pfi{font-family:'Playfair Display',serif;font-style:italic}
.btn{width:100%;padding:15px;border-radius:var(--r-md);background:var(--esp);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .2s;letter-spacing:.2px}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.sage{background:var(--sage)}.btn.brn{background:var(--brn)}.btn.out{background:transparent;border:.5px solid var(--bdr-md);color:var(--txt-md)}
.btn.out:hover{background:var(--cream-dk)}
.card{background:var(--wht);border-radius:var(--r-lg);border:.5px solid var(--bdr);box-shadow:var(--sh-sm);overflow:hidden}
.cp{padding:16px 18px}
.fl{display:block;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--txt-m);margin-bottom:7px}
input,textarea,select{width:100%;background:var(--cream);border:.5px solid var(--bdr);border-radius:var(--r-sm);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--esp);outline:none;transition:border-color .2s;margin-bottom:14px;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--brn)}
input::placeholder,textarea::placeholder{color:var(--txt-m)}
textarea{resize:vertical;line-height:1.5}
.sw{margin-bottom:20px}
.st{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sn{font-size:13px;font-weight:500;color:var(--esp)}.sv{font-size:13px;color:var(--brn);font-weight:500}
.se{display:flex;justify-content:space-between;margin-top:4px}
.sec{font-size:10px;color:var(--txt-m)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--bdr-md);outline:none;cursor:pointer;padding:0;margin-bottom:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--esp);cursor:pointer;box-shadow:var(--sh-sm)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--esp);cursor:pointer;border:none}
.chip{display:inline-block;padding:6px 13px;border-radius:20px;font-size:12px;border:.5px solid var(--bdr);background:var(--cream);color:var(--esp);cursor:pointer;transition:all .2s;margin:3px}
.chip.on{background:var(--esp);color:#fff;border-color:var(--esp)}
.chip.sage{background:var(--sage-pl);color:var(--sage);border-color:rgba(122,140,120,.3)}
.chip.brn{background:#FDF5ED;color:var(--brn);border-color:rgba(139,99,85,.25)}
.chip.red{background:#FDF0ED;color:#9B3A22;border-color:rgba(155,58,34,.2)}
.bdg{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.bdg.sage{background:var(--sage);color:#fff}.bdg.esp{background:var(--esp);color:#fff}
.sl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--txt-m);margin-bottom:10px}
.star{font-size:26px;cursor:pointer;color:rgba(44,24,16,.12);transition:color .1s}.star.on{color:var(--brn)}
.toast{position:absolute;bottom:82px;left:50%;transform:translateX(-50%);background:var(--esp);color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;box-shadow:var(--sh-lg);animation:tin .3s ease;pointer-events:none;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.mo{position:absolute;inset:0;background:rgba(20,10,6,.6);z-index:200;display:flex;align-items:flex-end}
.ms{background:var(--cream);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-height:88%;overflow-y:auto;padding:20px;scrollbar-width:none}
.ms::-webkit-scrollbar{display:none}
.mh{width:40px;height:4px;background:var(--bdr-md);border-radius:2px;margin:0 auto 20px}
.ob{background:var(--esp);min-height:100%;display:flex;flex-direction:column;padding:36px 28px 28px;color:#fff}
.opp{display:flex;gap:5px;margin-bottom:36px}
.opb{height:3px;flex:1;background:rgba(255,255,255,.12);border-radius:2px;transition:background .3s}
.opb.dn{background:var(--sage)}
.oh{font-family:'Playfair Display',serif;font-size:28px;line-height:1.28;margin-bottom:10px}
.os{font-size:14px;color:rgba(255,255,255,.5);line-height:1.65;margin-bottom:28px}
.oop{background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.1);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:13px;font-size:14px;color:#fff;transition:all .2s}
.oop:hover{background:rgba(255,255,255,.09)}.oop.on{background:rgba(122,140,120,.25);border-color:var(--sage)}
.ooi{font-size:20px;width:28px;text-align:center}
.otr{background:rgba(122,140,120,.12);border-left:2px solid var(--sage);border-radius:0 8px 8px 0;padding:12px 14px;margin:8px 0 20px;font-size:13px;color:rgba(255,255,255,.7);font-style:italic;line-height:1.55}
.obtn{background:var(--brn);color:#fff;border:none;border-radius:var(--r-md);padding:15px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;width:100%;margin-top:auto;transition:opacity .2s}
.obtn:hover{opacity:.88}
.oskp{background:none;border:none;color:rgba(255,255,255,.3);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;padding:12px;text-align:center;width:100%}
.pb{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}.pf2{height:100%;background:var(--sage);border-radius:3px;transition:width .4s ease}
.fade{animation:fd .25s ease}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bk{background:var(--cream-dk);border:.5px solid var(--bdr);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sep{height:.5px;background:var(--bdr);margin:8px 0}
.tgl{width:44px;height:24px;border-radius:12px;background:var(--bdr-md);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--sage)}
.tt{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on .tt{left:23px}
#gmap{width:100%;height:100%}
.maptip{position:absolute;bottom:10px;right:10px;background:rgba(250,247,242,.92);border-radius:8px;padding:5px 11px;font-size:11px;color:var(--esp);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:var(--sh-sm)}
.maplabel{position:absolute;top:10px;left:10px;background:rgba(44,24,16,.75);color:#fff;border-radius:8px;padding:4px 10px;font-size:10px}
</style>
</head>
<body>
<div id="root"><div class="shell" id="app"></div></div>

<!-- ══════════════════ APP SCRIPT ══════════════════ -->
<script>
// ── STATE ─────────────────────────────────────────────────────
var APP = {
  apiKey: localStorage.getItem('brewly_gmaps_key') || '',
  mapsLoaded: false,
  mapsLoading: false,
  userLat: null, userLng: null,
  locating: false,
  onboarded: !!localStorage.getItem('brewly_onboarded'),
  user: JSON.parse(localStorage.getItem('brewly_user') || JSON.stringify({
    name:'Alex', city:'Johannesburg', tier:'Flavour Explorer'
  })),
  tasteProfile: JSON.parse(localStorage.getItem('brewly_profile') || JSON.stringify({
    acidity:7.8, body:4.2, sweetness:6.5, intensity:4.8, fruitiness:8.5
  })),
  logs: JSON.parse(localStorage.getItem('brewly_logs') || '[]'),
  preferences: JSON.parse(localStorage.getItem('brewly_prefs') || JSON.stringify({
    likes:['Bright acidity','Fruity','African origins','Light roasts','V60 / Filter'],
    avoids:['Heavy bitterness','Dark roasts']
  })),
  beans: JSON.parse(localStorage.getItem('brewly_beans') || JSON.stringify([
    {id:1, origin:'Ethiopia Yirgacheffe', process:'Washed', roast:'Light', roaster:'Rosetta', stock:'High', tasting:['Bergamot','Jasmine','Lemon'], active:true},
    {id:2, origin:'Kenya Nyeri AA', process:'Washed', roast:'Light-Medium', roaster:'Father Coffee', stock:'Medium', tasting:['Blackcurrant','Tomato','Bright'], active:true},
    {id:3, origin:'Colombia El Paraiso', process:'Natural', roast:'Medium', roaster:'Truth.', stock:'Low', tasting:['Blueberry','Chocolate','Caramel'], active:true},
  ])),
  savedCustomers: JSON.parse(localStorage.getItem('brewly_customers') || '[]'),
  nearbyPlaces: [],
  currentScreen: 'home',
  selectedCafe: null,
  logVisible: false,
  logSuccess: false,
  logData: null,
  modal: null,
  toast: null,
  toastTimer: null,
};

function save(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
function saveAll(){
  save('brewly_user', APP.user);
  save('brewly_profile', APP.tasteProfile);
  save('brewly_logs', APP.logs);
  save('brewly_prefs', APP.preferences);
  save('brewly_beans', APP.beans);
  save('brewly_customers', APP.savedCustomers);
  localStorage.setItem('brewly_onboarded', '1');
}

// ── OPEN COFFEE DB ────────────────────────────────────────────
var COFFEE_DB = [
  {id:'eth1',name:'Ethiopia Yirgacheffe',region:'Yirgacheffe, Ethiopia',process:'Washed',roast:'Light',altitude:'1750–2200m',variety:'Heirloom',flavors:['Bergamot','Lemon','Jasmine','Peach'],acidity:8.5,body:3.5,sweetness:7,fruitiness:9,intensity:4,description:'Classic washed Ethiopian with stunning floral aromatics and citrus-forward brightness.',score:'92/100 · Coffee Review'},
  {id:'ken1',name:'Kenya AA Nyeri',region:'Nyeri, Kenya',process:'Washed',roast:'Light-Medium',altitude:'1600–1800m',variety:'SL28, SL34',flavors:['Blackcurrant','Tomato','Brown sugar','Sparkling acidity'],acidity:9,body:5,sweetness:6,fruitiness:8.5,intensity:5.5,description:'Iconic Kenyan with distinctive wine-like fruit and intense brightness.',score:'90/100 · Community'},
  {id:'col1',name:'Colombia Huila',region:'Huila, Colombia',process:'Washed',roast:'Medium',altitude:'1500–1900m',variety:'Caturra, Castillo',flavors:['Caramel','Red apple','Milk chocolate','Hazelnut'],acidity:6,body:6.5,sweetness:8,fruitiness:5,intensity:6,description:'Approachable Colombian with balanced sweetness and smooth, nutty finish.',score:'87/100 · Community'},
  {id:'bra1',name:'Brazil Cerrado Natural',region:'Cerrado, Brazil',process:'Natural',roast:'Medium-Dark',altitude:'900–1150m',variety:'Catuai, Bourbon',flavors:['Dark chocolate','Peanut','Brown sugar','Raisin'],acidity:3,body:9,sweetness:8.5,fruitiness:3,intensity:8,description:'Full-bodied natural Brazilian ideal for espresso. Rich, sweet and chocolatey.',score:'84/100 · Community'},
  {id:'eth2',name:'Ethiopia Guji Natural',region:'Guji, Ethiopia',process:'Natural',roast:'Light',altitude:'1900–2200m',variety:'Heirloom',flavors:['Blueberry','Strawberry','Chocolate','Wine-like'],acidity:7,body:6,sweetness:9,fruitiness:9.5,intensity:5,description:'Exotic natural-processed Ethiopian bursting with berry fruit and wine-like complexity.',score:'93/100 · Coffee Review'},
  {id:'rwa1',name:'Rwanda Huye Mountain',region:'Huye, Rwanda',process:'Washed',roast:'Light',altitude:'1650–2000m',variety:'Red Bourbon',flavors:['Peach','Rose','Caramel','Orange zest'],acidity:7.5,body:4.5,sweetness:8,fruitiness:7.5,intensity:4.5,description:'Elegant Rwandan Red Bourbon with delicate florals, stone fruit and brilliant clarity.',score:'89/100 · Community'},
];

function matchScore(bean){
  var p = APP.tasteProfile;
  var diff = Math.abs(bean.acidity - p.acidity) + Math.abs(bean.body - p.body) +
             Math.abs(bean.sweetness - p.sweetness) + Math.abs(bean.fruitiness - p.fruitiness) + Math.abs(bean.intensity - p.intensity);
  return Math.round(100 - (diff / 5) * 5);
}

// ── MAPS INTEGRATION ─────────────────────────────────────────
function loadGoogleMaps(key){
  if(APP.mapsLoaded || APP.mapsLoading) return;
  APP.mapsLoading = true;
  var s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key='+key+'&libraries=places,geometry&callback=onMapsReady';
  s.async = true; s.defer = true;
  document.head.appendChild(s);
}
window.onMapsReady = function(){
  APP.mapsLoaded = true;
  APP.mapsLoading = false;
  render();
  toast('✓ Google Maps connected');
};
window.gm_authFailure = function(){
  toast('⚠️ Invalid API key — check your Google Maps key');
  APP.apiKey = '';
  localStorage.removeItem('brewly_gmaps_key');
  render();
};

function getLocation(cb){
  if(!navigator.geolocation){ cb(null,'Geolocation not supported'); return; }
  APP.locating = true; render();
  navigator.geolocation.getCurrentPosition(
    function(pos){
      APP.userLat = pos.coords.latitude;
      APP.userLng = pos.coords.longitude;
      APP.locating = false;
      reverseGeocode(pos.coords.latitude, pos.coords.longitude);
      cb(pos.coords);
    },
    function(err){ APP.locating = false; cb(null, err.message); render(); },
    {timeout:10000,enableHighAccuracy:true}
  );
}

function reverseGeocode(lat,lng){
  if(!APP.mapsLoaded) return;
  var gc = new google.maps.Geocoder();
  gc.geocode({location:{lat,lng}}, function(res,status){
    if(status === 'OK' && res[0]){
      var comp = res[0].address_components;
      var city = (comp.find(c=>c.types.includes('locality')) || comp.find(c=>c.types.includes('sublocality')) || {}).long_name || 'Your location';
      APP.user.city = city;
      saveAll();
      render();
    }
  });
}

function searchNearbyCafes(lat,lng,cb){
  if(!APP.mapsLoaded){ cb([],'Maps not loaded'); return; }
  var dummy = document.createElement('div');
  var svc = new google.maps.places.PlacesService(dummy);
  var req = {
    location: new google.maps.LatLng(lat,lng),
    radius: 3000,
    keyword: 'specialty coffee cafe',
    type: 'cafe',
  };
  svc.nearbySearch(req, function(results,status){
    if(status === google.maps.places.PlacesServiceStatus.OK){
      var places = results.slice(0,8).map(function(p){
        return {
          id: p.place_id,
          name: p.name,
          area: p.vicinity,
          rating: p.rating || 4.0,
          reviews: p.user_ratings_total || 0,
          lat: p.geometry.location.lat(),
          lng: p.geometry.location.lng(),
          distance: calcDist(lat,lng,p.geometry.location.lat(),p.geometry.location.lng()),
          fit: Math.round(70 + Math.random()*28),
          open: p.opening_hours ? p.opening_hours.open_now : true,
          place_id: p.place_id,
          types: p.types || [],
          emoji: '☕',
          heroColor: '#2C1810',
          fitReason: ['Specialty café','Near you','Community rated'],
        };
      });
      places.sort(function(a,b){ return a.distance - b.distance; });
      APP.nearbyPlaces = places;
      cb(places);
    } else {
      cb([],'No results: '+status);
    }
  });
}

function getPlaceDetails(placeId, cb){
  if(!APP.mapsLoaded){ cb(null); return; }
  var dummy = document.createElement('div');
  var svc = new google.maps.places.PlacesService(dummy);
  svc.getDetails({
    placeId: placeId,
    fields: ['name','formatted_address','formatted_phone_number','opening_hours','website','url','photos','reviews','rating','price_level','types']
  }, function(result, status){
    if(status === google.maps.places.PlacesServiceStatus.OK){ cb(result); }
    else{ cb(null); }
  });
}

function calcDist(lat1,lng1,lat2,lng2){
  if(APP.mapsLoaded && google.maps.geometry){
    var m = google.maps.geometry.spherical.computeDistanceBetween(
      new google.maps.LatLng(lat1,lng1), new google.maps.LatLng(lat2,lng2)
    );
    return (m/1000).toFixed(1);
  }
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

function openInGoogleMaps(cafe){
  var url;
  if(cafe.place_id){
    url='https://www.google.com/maps/place/?q=place_id:'+cafe.place_id;
  } else if(cafe.lat && cafe.lng){
    url='https://www.google.com/maps/dir/?api=1&destination='+cafe.lat+','+cafe.lng;
  } else {
    url='https://www.google.com/maps/search/'+encodeURIComponent(cafe.name);
  }
  window.open(url,'_blank');
}

// ── MAPS RENDER ───────────────────────────────────────────────
var mapInstances = {};
function renderMap(elId, lat, lng, markers){
  setTimeout(function(){
    var el = document.getElementById(elId);
    if(!el || !APP.mapsLoaded) return;
    if(mapInstances[elId]){ mapInstances[elId].setCenter({lat,lng}); return; }
    var map = new google.maps.Map(el, {
      center:{lat,lng}, zoom:14,
      styles:[
        {featureType:'all',elementType:'geometry',stylers:[{color:'#1e2a1e'}]},
        {featureType:'water',elementType:'geometry',stylers:[{color:'#0e1a12'}]},
        {featureType:'road',elementType:'geometry',stylers:[{color:'#2d3d2c'}]},
        {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
        {featureType:'transit',elementType:'labels',stylers:[{visibility:'off'}]},
        {elementType:'labels.text.fill',stylers:[{color:'#a0b090'}]},
        {elementType:'labels.text.stroke',stylers:[{color:'#1a2a1a'}]},
      ],
      mapTypeControl:false,streetViewControl:false,fullscreenControl:false,zoomControl:false,
      gestureHandling:'cooperative',
    });
    mapInstances[elId] = map;
    if(!markers || !markers.length){ markers = [{lat,lng,name:'You are here'}]; }
    markers.forEach(function(m,i){
      var mk = new google.maps.Marker({
        position:{lat:m.lat,lng:m.lng},
        map:map,
        title:m.name,
        icon:{
          path:google.maps.SymbolPath.CIRCLE,
          scale:i===0?12:9,
          fillColor:i===0?'#C4A882':'#7A8C78',
          fillOpacity:1,
          strokeWeight:2,
          strokeColor:'#FAF7F2',
        }
      });
      var iw = new google.maps.InfoWindow({content:'<div style="font-family:DM Sans,sans-serif;font-size:12px;color:#2C1810;padding:4px">'+m.name+'</div>'});
      mk.addListener('click',function(){ iw.open(map,mk); });
    });
  }, 100);
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg){
  APP.toast = msg;
  if(APP.toastTimer) clearTimeout(APP.toastTimer);
  render();
  APP.toastTimer = setTimeout(function(){ APP.toast=null; render(); }, 2800);
}

// ── RENDER ENGINE ─────────────────────────────────────────────
function render(){
  var root = document.getElementById('app');
  if(!root) return;
  root.innerHTML = buildApp();
  attachEvents();
  handleMaps();
}

function handleMaps(){
  // Render maps after DOM is ready
  if(!APP.mapsLoaded) return;
  var dm = document.getElementById('discover-map');
  var cd = document.getElementById('cafe-detail-map');
  if(dm){
    var lat = APP.userLat || -26.2041, lng = APP.userLng || 28.0473;
    var markers = APP.nearbyPlaces.length ? APP.nearbyPlaces.map(function(p){return{lat:parseFloat(p.lat),lng:parseFloat(p.lng),name:p.name};}) : [{lat:lat,lng:lng,name:APP.user.city}];
    renderMap('discover-map', lat, lng, markers);
  }
  if(cd && APP.selectedCafe && APP.selectedCafe.lat){
    renderMap('cafe-detail-map', parseFloat(APP.selectedCafe.lat), parseFloat(APP.selectedCafe.lng), [{lat:parseFloat(APP.selectedCafe.lat),lng:parseFloat(APP.selectedCafe.lng),name:APP.selectedCafe.name}]);
  }
}

// ── BUILD HTML ────────────────────────────────────────────────
function buildApp(){
  if(!APP.apiKey) return buildApiKeySetup();
  if(!APP.onboarded) return buildOnboarding();
  if(APP.logSuccess && APP.logData) return buildShell(buildLogSuccess(), true);
  if(APP.logVisible) return buildShell(buildLogFlow(), true);
  if(APP.selectedCafe) return buildShell(buildCafeDetail(), true);
  if(APP.currentScreen === 'barista') return buildShell(buildBaristaPortal(), true);
  var content = '';
  if(APP.currentScreen==='home') content = buildHome();
  else if(APP.currentScreen==='discover') content = buildDiscover();
  else if(APP.currentScreen==='profile') content = buildProfile();
  return buildShell(content, false);
}

function buildShell(content, hideNav){
  var nav = hideNav ? '' : buildNav();
  var toastHtml = APP.toast ? '<div class="toast">'+APP.toast+'</div>' : '';
  var modal = APP.modal ? buildModal() : '';
  return '<div class="scr fade">'+content+'</div>'+nav+toastHtml+modal;
}

  if(s===4){

function buildRadarSVG(p){
  var sz=200,cx=100,cy=100,r=72;
  var axes=['Acidity','Fruitiness','Sweetness','Body','Intensity'];
  var vals=[p.acidity,p.fruitiness,p.sweetness,p.body,p.intensity];
  function pt(v,i){
    var ang=(i/5)*2*Math.PI-Math.PI/2;
    var frac=(v/10)*r;
    return [(cx+Math.cos(ang)*frac).toFixed(1),(cy+Math.sin(ang)*frac).toFixed(1)];
  }
  function axPt(frac,i){
    var ang=(i/5)*2*Math.PI-Math.PI/2;
    return [(cx+Math.cos(ang)*r*frac).toFixed(1),(cy+Math.sin(ang)*r*frac).toFixed(1)];
  }
  var rings=[.25,.5,.75,1].map(function(f){
    return [0,1,2,3,4].map(function(i){return axPt(f,i).join(',');}).join(' ');
  });
  var dataPath=[0,1,2,3,4].map(function(i){var p2=pt(vals[i],i);return (i===0?'M':'L')+p2.join(',');}).join(' ')+'Z';
  var labelPts=[0,1,2,3,4].map(function(i){
    var ang=(i/5)*2*Math.PI-Math.PI/2;
    return [(cx+Math.cos(ang)*(r+18)).toFixed(1),(cy+Math.sin(ang)*(r+18)).toFixed(1)];
  });
  return '<svg viewBox="0 0 '+sz+' '+sz+'" width="'+sz+'" height="'+sz+'" style="display:block;margin:0 auto">'+
    rings.map(function(pts){return '<polygon points="'+pts+'" fill="none" stroke="rgba(44,24,16,.08)" stroke-width=".8"/>';}).join('')+
    [0,1,2,3,4].map(function(i){var a=axPt(1,i);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+a[0]+'" y2="'+a[1]+'" stroke="rgba(44,24,16,.08)" stroke-width=".8"/>';}).join('')+
    '<path d="'+dataPath+'" fill="rgba(122,140,120,.18)" stroke="#7A8C78" stroke-width="2"/>'+
    [0,1,2,3,4].map(function(i){var pp=pt(vals[i],i);return '<circle cx="'+pp[0]+'" cy="'+pp[1]+'" r="4" fill="#7A8C78"/>';}).join('')+
    labelPts.map(function(lp,i){return '<text x="'+lp[0]+'" y="'+lp[1]+'" text-anchor="middle" dominant-baseline="middle" font-size="8.5" fill="#9A8070" font-family="DM Sans,sans-serif">'+axes[i]+'</text>';}).join('')+
  '</svg>';
}

// ── EVENTS ────────────────────────────────────────────────────
function attachEvents(){ /* event handlers via onclick */ }
function e(s){ return (s||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// Navigation
function nav(s){
  APP.currentScreen=s; APP.logVisible=false; APP.logSuccess=false;
  APP.selectedCafe=null; APP._cafeFeedback=null;
  if(s==='log'){ APP.logVisible=true; APP._logStep=1; APP._logData=null; }
  render();
}
function goDiscover(){ nav('discover'); }
function openLog(){ APP.logVisible=true; APP._logStep=1; APP._logData=null; render(); }
function backHome(){ APP.logSuccess=false; APP.logData=null; APP.currentScreen='home'; render(); }

// Onboarding
function obStep(s){ APP._obStep=s; render(); }
function obToggle(s,v){
  var k='s'+s; APP._obSel=APP._obSel||{};
  var arr=APP._obSel[k]||[];
  APP._obSel[k]=arr.includes(v)?arr.filter(function(x){return x!==v;}):[...arr,v];
  APP._obSel[v]=v; // shortcut for translations
  render();
}
function finishOb(){ APP.onboarded=true; localStorage.setItem('brewly_onboarded','1'); render(); }

// Log flow
function ld(k,v){ APP._logData=APP._logData||{}; APP._logData[k]=v; render(); }
function logBack(s){ if(s===1){ APP.logVisible=false; } else { APP._logStep=s-1; } render(); }
function logNext(s){
  var d=APP._logData||{};
  if(s===1 && !d.name){ toast('Please enter a coffee name'); return; }
  if(s===1 && !d.cafe){ toast('Please enter the café name'); return; }
  APP._logStep=s+1; render();
}
function toggleFlavor(f){
  var d=APP._logData=APP._logData||{}; d.flavors=d.flavors||[];
  d.flavors=d.flavors.includes(f)?d.flavors.filter(function(x){return x!==f;}):[...d.flavors,f];
  render();
}
function fillFromDB(id){
  var b=COFFEE_DB.find(function(x){return x.id===id;});
  if(!b) return;
  APP._logData=APP._logData||{};
  APP._logData.name=b.name;
  APP._logData.acidity=Math.round(b.acidity);
  APP._logData.body=Math.round(b.body);
  APP._logData.sweetness=Math.round(b.sweetness);
  APP._logData.fruitiness=Math.round(b.fruitiness);
  APP._logData.intensity=Math.round(b.intensity);
  APP._logData.flavors=b.flavors.slice();
  toast('Pre-filled from database: '+b.name);
  render();
}
function saveCoffeeLog(){
  var d=APP._logData||{};
  if(!d.name){ toast('Please enter a coffee name'); return; }
  var entry={
    id:Date.now(), name:d.name||'Unnamed', cafe:d.cafe||'Unknown', city:d.city||APP.user.city,
    method:d.method||'V60', rating:d.rating||0, acidity:d.acidity||5, body:d.body||5,
    sweetness:d.sweetness||5, intensity:d.intensity||5, fruitiness:d.fruitiness||5,
    flavors:d.flavors||[], feedback:d.feedback||'', reorder:d.reorder,
    notes:d.notes||'', date:'just now'
  };
  APP.logs.push(entry);
  // Update taste profile (rolling avg)
  var n=APP.logs.length;
  var p=APP.tasteProfile;
  p.acidity = +((p.acidity*(n-1)+entry.acidity)/n).toFixed(1);
  p.body = +((p.body*(n-1)+entry.body)/n).toFixed(1);
  p.sweetness = +((p.sweetness*(n-1)+entry.sweetness)/n).toFixed(1);
  p.intensity = +((p.intensity*(n-1)+entry.intensity)/n).toFixed(1);
  p.fruitiness = +((p.fruitiness*(n-1)+entry.fruitiness)/n).toFixed(1);
  saveAll();
  APP.logData=entry; APP.logVisible=false; APP.logSuccess=true; APP._logData=null; APP._logStep=1;
  render();
}

// Discover
function discFilter(f){ APP._discFilter=f; render(); }
function discSearch(v){ APP._discSearch=v; }
function toggleBeanDB(){ APP._showBeanDB=!APP._showBeanDB; render(); }
function locateMe(){
  if(!APP.mapsLoaded){ toast('Enable Google Maps first (Profile → Settings)'); return; }
  getLocation(function(coords,err){
    if(err){ toast('Location: '+err); return; }
    toast('📍 Found your location!');
    searchNearbyCafes(coords.latitude,coords.longitude,function(places,err2){
      if(err2 || !places.length){ toast('No specialty cafés found nearby'); return; }
      toast('Found '+places.length+' specialty cafés near you!');
      render();
    });
  });
}
function nearMe(){ locateMe(); }
function openGMaps(){
  var url='https://www.google.com/maps/search/specialty+coffee+near+'+encodeURIComponent(APP.user.city);
  window.open(url,'_blank');
}

// Café detail
function selectCafe(id){
  var place=APP.nearbyPlaces.find(function(p){return p.id===id;});
  if(!place) return;
  APP.selectedCafe=place; APP._cafeDetails=null; APP._cafeFeedback=null;
  render();
  if(APP.mapsLoaded && place.place_id){
    getPlaceDetails(place.place_id, function(details){
      APP._cafeDetails=details; render();
    });
  }
}
function clearCafe(){ APP.selectedCafe=null; APP._cafeDetails=null; render(); }
function cafeFeedback(f){ APP._cafeFeedback=f; toast('Feedback sent to barista! 📬'); render(); }
function saveCafe(){ toast('Café saved to favourites! ♡'); }
function openGMapsForCafe(){
  var c=APP.selectedCafe;
  if(!c) return;
  openInGoogleMaps(c);
}

// Profile
function addLike(){
  var inp=document.getElementById('add-like');
  if(!inp || !inp.value.trim()) return;
  APP.preferences.likes.push(inp.value.trim());
  saveAll(); toast('Added to preferences!'); render();
}
function showQRModal(){ APP.modal='qr'; render(); }
function closeModal(){ APP.modal=null; render(); }
function shareProfile(){
  var text='My Brewly taste profile: Loves '+APP.preferences.likes.slice(0,3).join(', ')+'. Avoids '+APP.preferences.avoids.join(', ')+'. brewly.app';
  if(navigator.clipboard){ navigator.clipboard.writeText(text); }
  toast('Profile link copied! 📋'); closeModal();
}
function refreshApiKey(){ APP.apiKey=''; localStorage.removeItem('brewly_gmaps_key'); render(); }

// Barista
function bTab(t){ APP._bTab=t; render(); }
function addCustomerProfile(){
  var n={id:Date.now(),name:'Walk-in customer',date:new Date().toLocaleDateString(),table:Math.ceil(Math.random()*15),likes:['Unknown'],avoids:[],confirmed:false,notes:''};
  APP.savedCustomers.push(n); saveAll(); toast('New customer profile created'); render();
}
function updateCustomer(i,k,v){ APP.savedCustomers[i][k]=v; saveAll(); }
function toggleConfirm(i){ APP.savedCustomers[i].confirmed=!APP.savedCustomers[i].confirmed; saveAll(); render(); }
function deleteCustomer(i){ APP.savedCustomers.splice(i,1); saveAll(); toast('Profile removed'); render(); }
function recommendForCustomer(i){
  var c=APP.savedCustomers[i];
  var wantsFruity=c.likes&&c.likes.some(function(l){return l.toLowerCase().includes('fruit')||l.toLowerCase().includes('citrus');});
  var match=APP.beans.find(function(b){return b.active&&(wantsFruity?b.roast.includes('Light'):b.roast.includes('Medium'));});
  toast(match?'Recommend: '+match.origin+' ('+match.process+')':'Try asking about their preferred balance first');
}
function showAddBean(){ APP._addingBean=true; APP._newBean={origin:'',process:'Washed',roast:'Light',roaster:'',stock:'Medium',tasting:''}; render(); }
function cancelAddBean(){ APP._addingBean=false; APP._newBean=null; render(); }
function updateNewBean(k,v){ APP._newBean=APP._newBean||{}; APP._newBean[k]=v; render(); }
function saveNewBean(){
  var nb=APP._newBean||{};
  if(!nb.origin){ toast('Please enter bean origin/name'); return; }
  APP.beans.push({id:Date.now(),origin:nb.origin,process:nb.process||'Washed',roast:nb.roast||'Light',roaster:nb.roaster||'',stock:nb.stock||'Medium',tasting:(nb.tasting||'').split(',').map(function(t){return t.trim();}).filter(Boolean),active:true});
  APP._addingBean=false; APP._newBean=null; saveAll(); toast('Bean added to inventory! 🫘'); render();
}
function deleteBean(i){ APP.beans.splice(i,1); saveAll(); toast('Bean removed'); render(); }
function updateBeanStock(i,v){ APP.beans[i].stock=v; saveAll(); render(); }
function updateCafeProfile(k,v){ APP._cafeProfile=APP._cafeProfile||{}; APP._cafeProfile[k]=v; }
function saveCafeProfile(){ saveAll(); toast('Café profile saved! ✓'); }

// API Key
function submitApiKey(){
  var key=(document.getElementById('api-key-input')||{}).value||'';
  if(!key||key.length<20){ document.getElementById('api-err').textContent='Please enter a valid API key (starts with AIza...)'; return; }
  APP.apiKey=key; localStorage.setItem('brewly_gmaps_key',key);
  render();
  loadGoogleMaps(key);
}
function skipMaps(){
  APP.apiKey='SKIP'; render();
}

// ── BOOT ──────────────────────────────────────────────────────
render();
if(APP.apiKey && APP.apiKey !== 'SKIP'){
  loadGoogleMaps(APP.apiKey);
}
</script>
